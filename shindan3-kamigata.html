<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>髪型診断 | Men's Rise</title>
  <meta name="description" content="あなたの顔型×印象タイプから似合う髪型を提案します。6つの質問に答えるだけの簡単診断。">
  <link rel="stylesheet" href="css/style.css?v=202604230300">
</head>
<body>
  <div id="app"></div>

  <script src="js/config.js?v=202604230300"></script>
  <script src="js/database.js?v=202604230300"></script>
  <script src="js/cta-variants.js?v=202604230300"></script>
  <script src="js/icons.js?v=202604230300"></script>
  <script src="js/quiz-engine.js?v=202604230300"></script>
  <script>
    new QuizEngine({      diagnosisId: 'kamigata',
      iconSvg: MR_ICONS.kamigata,
      title: '顔型別<br>似合うヘアスタイル診断',
      description: 'あなたの顔型×印象タイプから<br>似合う髪型を提案します',
      meta: '所要時間：約2分 ｜ 全8問',

      questions: [
        {
          id: 'faceShape',
          text: '顔の形は？',
          hint: '鏡で見るか写真を撮って、輪郭を確認してください。迷ったら「正面の輪郭が一番近いもの」を選びましょう。',
          type: 'icon-choice',
          options: [
            { label: '卵型', desc: '縦横のバランスが良い標準的な輪郭', value: 'oval', icon: MR_ICONS.faceOval },
            { label: '丸顔', desc: '縦と横の長さがほぼ同じで丸みがある', value: 'round', icon: MR_ICONS.faceRound },
            { label: '面長', desc: '縦幅が横幅より明らかに長い', value: 'long', icon: MR_ICONS.faceLong },
            { label: 'ベース型', desc: 'エラが張っていて顎のラインがしっかり', value: 'square', icon: MR_ICONS.faceSquare },
            { label: '逆三角形', desc: 'おでこが広く顎がシャープに細い', value: 'inverted', icon: MR_ICONS.faceInverted }
          ]
        },
        {
          id: 'childAdult',
          text: '子供顔？大人顔？',
          hint: '3つのチェックで判定します',
          type: 'sub-questions',
          subQuestions: [
            { label: '①輪郭', options: [{ label: '丸っこい', value: 'A' }, { label: '縦に長い', value: 'B' }] },
            { label: '②顎', options: [{ label: '短くて丸い', value: 'A' }, { label: '長くてシャープ', value: 'B' }] },
            { label: '③目の位置', options: [{ label: '顔の真ん中より下', value: 'A' }, { label: '真ん中か上', value: 'B' }] }
          ]
        },
        {
          id: 'cuteHandsome',
          text: 'かわいい系？かっこいい系？',
          hint: '3つのチェックで判定します',
          type: 'sub-questions',
          subQuestions: [
            { label: '①目の形', options: [{ label: '丸い', value: 'A' }, { label: '切れ長', value: 'B' }] },
            { label: '②頬', options: [{ label: 'ふっくら丸み', value: 'A' }, { label: '骨っぽく角張ってる', value: 'B' }] },
            { label: '③眉の形', options: [{ label: 'カーブしたアーチ型', value: 'A' }, { label: '直線的で角張ってる', value: 'B' }] }
          ]
        },
        {
          id: 'hairType',
          text: '髪質は？',
          options: [
            { label: 'くせ毛', value: 'curly' },
            { label: '直毛', value: 'straight' }
          ]
        },
        {
          id: 'forehead',
          text: 'おでこの広さは？',
          options: [
            { label: '広い', value: 'wide' },
            { label: '普通', value: 'normal' },
            { label: '狭い', value: 'narrow' }
          ]
        },
        {
          id: 'vibe',
          text: '目指す雰囲気は？',
          options: [
            { label: '韓国系', value: 'korean' },
            { label: 'ナチュラル', value: 'natural' },
            { label: 'ワイルド', value: 'wild' },
            { label: 'ビジネス', value: 'business' }
          ]
        },
        {
          id: 'salonFreq',
          text: '美容院に行く頻度は？',
          options: [
            { label: '月1回', value: 'monthly' },
            { label: '2〜3ヶ月に1回', value: 'bimonthly' },
            { label: '半年に1回', value: 'semiannual' },
            { label: 'ほぼ行かない', value: 'rare' }
          ]
        },
        {
          id: 'salonBudget',
          text: '美容院の1回の予算は？',
          options: [
            { label: '3,000円以内', value: 'low' },
            { label: '5,000円以内', value: 'mid' },
            { label: '8,000円以内', value: 'high' },
            { label: 'こだわらない', value: 'unlimited' }
          ]
        }
      ],

      calcResult: function(answers) {
        // Q2: 子供顔 vs 大人顔
        var childAdultArr = answers.childAdult;
        var aCountCA = childAdultArr.filter(function(v) { return v === 'A'; }).length;
        var childOrAdult = aCountCA >= 2 ? 'child' : 'adult';

        // Q3: かわいい系 vs かっこいい系
        var cuteHandsomeArr = answers.cuteHandsome;
        var aCountCH = cuteHandsomeArr.filter(function(v) { return v === 'A'; }).length;
        var cuteOrCool = aCountCH >= 2 ? 'cute' : 'cool';

        // 印象タイプ
        var impressionType;
        if (childOrAdult === 'adult' && cuteOrCool === 'cool') {
          impressionType = 'かっこいい大人';
        } else if (childOrAdult === 'adult' && cuteOrCool === 'cute') {
          impressionType = 'かわいい大人';
        } else if (childOrAdult === 'child' && cuteOrCool === 'cool') {
          impressionType = 'かっこいい少年';
        } else {
          impressionType = 'かわいい少年';
        }

        return {
          faceShape: answers.faceShape,
          impressionType: impressionType,
          hairType: answers.hairType,
          forehead: answers.forehead,
          vibe: answers.vibe
        };
      },

      renderResult: function(result, answers) {
        var faceShapeNames = {
          oval: '卵型',
          round: '丸顔',
          long: '面長',
          square: 'ベース型',
          inverted: '逆三角形'
        };

        var faceData = {
          oval: {
            direction: 'バランスが良く何でも似合う。前髪を上げてもOK、重めマッシュもOK。',
            recommended: ['センターパート', 'ナチュラルマッシュ', 'アップバング'],
            avoid: '特になし（何でもいける）',
            celebs: '佐藤健、竹内涼真',
            why: '縦横比が理想的で重心のバランスが取れている。どんなシルエットでも顔の形が邪魔しない。だからこそ「自分の好み」や「なりたい印象」で自由に選べるのが最大の強み。',
            order: '「全体的にレイヤーを入れた、ナチュラルなマッシュでお願いします。前髪は眉の下1cmくらいで、センターパートか下ろすかで悩める感じにしてください。サイドと襟足はやや短めに。」',
            routineType: 'mash'
          },
          round: {
            direction: '縦ラインを意識。トップにボリュームを出し、サイドをタイトに。',
            recommended: ['アップバング', 'ツーブロック×マッシュ', 'センターパート'],
            avoid: '前髪パッツン、横に広がるスタイル',
            celebs: '菅田将暉、ムロツヨシ',
            why: '顔の縦横比がほぼ1:1。横に広く見えやすいので、トップの高さと縦のラインで中和する。サイドをタイトに締めることで、顔の輪郭を引き締めて見せられる。',
            order: '「トップにボリュームが出るようにレイヤーを入れて、サイドはタイトに刈り上げてください。前髪は重めに残して、スタイリングで上げ下げできる長さにしてほしいです。ツーブロックでお願いします。」',
            routineType: 'up'
          },
          long: {
            direction: '横にボリュームを持たせて縦の長さを中和する。',
            recommended: ['横にボリュームのあるマッシュ', 'ちょい上げセンターパート', 'パーマ'],
            avoid: '前髪完全に上げるアップバング、サイド刈り上げツーブロック',
            celebs: '佐藤健、坂口健太郎',
            why: '縦の長さが強調されがち。横にボリュームを足し、前髪を下ろすことで顔の縦幅を視覚的に短縮する。パーマで横幅を出すのも有効な戦略。',
            order: '「横にボリュームが出る重めのマッシュでお願いします。前髪は眉にかかる長さで重めに。サイドはふんわり残して、刈り上げは絶対にしないでください。パーマも相談したいです。」',
            routineType: 'mash'
          },
          square: {
            direction: 'エラをカバー。サイドにボリュームをつけすぎず、トップでひし形シルエットを作る。',
            recommended: ['マッシュ（耳周りを少し長めに）', 'センターパート', 'パーマ'],
            avoid: 'サイド刈り上げ、前髪なしでエラ丸出し',
            celebs: '山田孝之、松田翔太',
            why: 'エラが張って下半分が目立つ。サイドにボリュームを持たせて顔の上下でひし形を作り、視線を中央に集める。耳周りに髪を残すことでエラをカバーできる。',
            order: '「耳周りに少し長さを残したマッシュで、トップにレイヤーを入れてひし形シルエットにしてください。前髪はやや重めで、サイドが顔を覆う感じに。エラをカバーしたいです。」',
            routineType: 'mash'
          },
          inverted: {
            direction: '顎のシャープさを活かしつつ、トップのボリュームは控えめに。',
            recommended: ['ナチュラルマッシュ', '重めバング', 'パーマ'],
            avoid: 'トップだけボリュームを出す（逆三角が強調）',
            celebs: '小栗旬、岡田将生',
            why: 'おでこが広くアゴがシャープ。トップに高さを出しすぎると三角形が強調されるので、前髪でおでこを隠すかトップを抑える。重めバングで上半分の幅を調整するのが定石。',
            order: '「重めのバングで、前髪はやや厚めにお願いします。トップはボリュームを出しすぎず、全体的にナチュラルなマッシュで。パーマで柔らかさを足すのも検討したいです。」',
            routineType: 'heavy'
          }
        };

        var routineSteps = {
          mash: [
            'タオルドライ（擦らず押さえる）',
            'ドライヤーでトップから根元を立ち上げる',
            '全体を軽く乾かす（8割程度）',
            'スタイリング剤を手のひら全体に広げ、髪の中間から毛先へ',
            '指で束感を作り、前髪を整える'
          ],
          up: [
            '根元を起こしながらドライヤー',
            '前髪を後ろに流すように乾かす',
            'スタイリング剤を根元から付ける',
            'トップを上に、サイドをタイトに整える',
            '最後にハードスプレーで固定'
          ],
          heavy: [
            'タオルドライ後、根元を優しく乾かす',
            '前髪を下ろしたまま形を作る',
            'スタイリング剤をマット系で軽く揉み込む',
            '前髪に束感を作りすぎない（自然に）',
            'サイドは耳にかけない'
          ]
        };

        var routineLabels = {
          mash: 'マッシュ系スタイルの朝のルーティン',
          up: 'アップバング・ツーブロック系の朝のルーティン',
          heavy: '重めバング系の朝のルーティン'
        };

        var ngActions = [
          'ワックスを髪の根元だけに付ける（束感が出ない）',
          'ドライヤーを使わず自然乾燥（寝癖＆ボリューム出ない）',
          '毎日同じ分け目（薄毛の原因）',
          'スタイリング剤の付けすぎ（重くなる）',
          '美容院に3ヶ月以上行かない（伸びすぎてシルエット崩壊）'
        ];

        var fd = faceData[result.faceShape];
        var shapeName = faceShapeNames[result.faceShape];

        var html = '';

        // Result header
        html += '<div class="result-header">';
        html += '<div class="result-label">YOUR STYLE</div>';
        html += '<div class="result-type">' + shapeName + ' × ' + result.impressionType + ' タイプ</div>';
        html += '</div>';

        // ── あなたに似合う髪型 写真カード ──
        var styleData = {
          oval: {
            'かっこいい少年': { name: '王道ウルフマッシュ', img: 'images/hair-oval-cool-child.jpg' },
            'かっこいい大人': { name: '耳掛けセンターパート', img: 'images/hair-oval-cool-adult.png' },
            'かわいい少年':   { name: '波巻きセンターパート', img: 'images/hair-oval-cute-child.jpg' },
            'かわいい大人':   { name: 'アップバングショート', img: 'images/hair-oval-cute-adult.png' }
          },
          round: {
            'かっこいい少年': { name: 'ショートマッシュ × 無造作パーマ', img: 'images/hair-round-cool-child.jpg' },
            'かっこいい大人': { name: 'アップバング', img: 'images/hair-round-cool-adult.jpg' },
            'かわいい少年':   { name: 'シースルマッシュ', img: 'images/hair-round-cute-child.png' },
            'かわいい大人':   { name: 'コンマフェザー', img: 'images/hair-round-cute-adult.jpg' }
          },
          long: {
            'かっこいい少年': { name: 'ラウンドマッシュ', img: 'images/hair-long-cool-child.jpg' },
            'かっこいい大人': { name: 'スパイキーショート', img: 'images/hair-long-cool-adult.jpg' },
            'かわいい少年':   { name: 'シースルマッシュ', img: 'images/hair-long-cute-child.jpg' },
            'かわいい大人':   { name: 'センターパート', img: 'images/hair-long-cute-adult.jpg' }
          },
          // ベース型・逆三角形は面長と同じ傾向（骨格補正の方向性が近い）
          square: {
            'かっこいい少年': { name: 'ラウンドマッシュ', img: 'images/hair-long-cool-child.jpg' },
            'かっこいい大人': { name: 'スパイキーショート', img: 'images/hair-long-cool-adult.jpg' },
            'かわいい少年':   { name: 'シースルマッシュ', img: 'images/hair-long-cute-child.jpg' },
            'かわいい大人':   { name: 'センターパート', img: 'images/hair-long-cute-adult.jpg' }
          },
          inverted: {
            'かっこいい少年': { name: 'ラウンドマッシュ', img: 'images/hair-long-cool-child.jpg' },
            'かっこいい大人': { name: 'スパイキーショート', img: 'images/hair-long-cool-adult.jpg' },
            'かわいい少年':   { name: 'シースルマッシュ', img: 'images/hair-long-cute-child.jpg' },
            'かわいい大人':   { name: 'センターパート', img: 'images/hair-long-cute-adult.jpg' }
          }
        };
        var style = styleData[result.faceShape] && styleData[result.faceShape][result.impressionType];
        if (style) {
          var photoHtml = '';
          photoHtml += '<div style="text-align:center;margin-bottom:14px;">';
          photoHtml += '<img src="' + style.img + '" alt="' + style.name + '" loading="lazy" style="width:100%;max-width:360px;aspect-ratio:3/4;object-fit:cover;border-radius:var(--radius-md);display:block;margin:0 auto;filter:contrast(1.06) saturate(1.05);">';
          photoHtml += '</div>';
          photoHtml += '<div style="text-align:center;font-size:1.1rem;font-weight:700;color:var(--white);margin-bottom:4px;">' + style.name + '</div>';
          photoHtml += '<div style="text-align:center;font-size:0.78rem;color:var(--text-muted);">あなたに一番似合う髪型</div>';
          html += QuizEngine.resultCard('YOUR HAIRSTYLE ─ あなたに似合う髪型', photoHtml);
        }

        // ───── ① 原因カード ─────
        html += QuizEngine.resultCard(
          'CAUSE ─ あなたがこの髪型である理由',
          '<p style="line-height:1.85; font-family:inherit;">' + fd.why + '</p>'
        );

        // ───── ② 正解アクション 見出し ─────
        html += '<div style="text-align:center; margin:40px 0 20px;">'
              + '<div style="font-size:0.75rem; letter-spacing:0.2em; color:var(--gold); margin-bottom:6px;">ACTION</div>'
              + '<div style="font-size:1.1rem; font-weight:700; color:var(--white); font-family:inherit;">あなたの正解アクション</div>'
              + '<div style="width:40px; height:1px; background:var(--gold); margin:16px auto 0;"></div>'
              + '</div>';

        // 2-1. 美容院オーダー文言
        var orderHtml = '<p style="margin-bottom:10px; font-size:0.82rem; color:#ccc; font-family:inherit;">美容師さんにそのまま見せればOK。スクショを送るだけで、あなたに合った髪型がオーダーできます。</p>';
        orderHtml += '<div class="result-highlight">' + fd.order + '</div>';
        html += QuizEngine.resultCard('① 美容院でのオーダー文言', orderHtml);

        // 2-2. 毎日のスタイリング手順（番号付き）
        var steps = routineSteps[fd.routineType];
        var stepsHtml = '<p style="margin-bottom:14px; font-size:0.82rem; color:#ccc; font-family:inherit;">' + routineLabels[fd.routineType] + '</p>';
        for (var s = 0; s < steps.length; s++) {
          stepsHtml += '<div style="display:flex; align-items:center; gap:12px; padding:10px 12px; background:var(--bg-elevated); border-radius:8px; margin-bottom:6px;">'
                    + '<span style="display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:26px; border-radius:50%; background:rgba(200,169,110,0.15); color:var(--gold); font-weight:700; font-size:0.82rem; font-family:inherit;">' + (s + 1) + '</span>'
                    + '<span style="color:#f0f0f0; font-size:0.85rem; line-height:1.55; font-family:inherit;">' + steps[s] + '</span>'
                    + '</div>';
        }
        html += QuizEngine.resultCard('② 毎日のスタイリング手順', stepsHtml);

        // 2-3. おすすめスタイリング剤
        var products = getProductRecommendations(result);
        var prodHtml = '<p style="font-size:0.82rem; color:#ccc; margin-bottom:14px; font-family:inherit;">あなたの髪質・目指す雰囲気に合うスタイリング剤。</p>';
        for (var p = 0; p < products.length; p++) {
          prodHtml += '<div style="padding:14px; background:var(--bg-elevated); border-radius:8px; margin-bottom:10px; border-left:3px solid var(--gold);">'
                   + '<div style="color:#fff; font-size:0.92rem; font-weight:700; margin-bottom:6px; font-family:inherit;">' + products[p].name + '</div>'
                   + '<div style="color:#c8c8c8; font-size:0.78rem; line-height:1.55; margin-bottom:8px; font-family:inherit;">' + products[p].desc + '</div>'
                   + '<a href="' + products[p].url + '" target="_blank" rel="noopener" style="color:var(--gold); font-size:0.74rem; font-family:inherit;">商品ページを見る →</a>'
                   + '</div>';
        }
        html += QuizEngine.resultCard('③ おすすめスタイリング剤', prodHtml);

        // ───── オプション ─────
        html += '<div style="text-align:center; margin:48px 0 20px;">'
              + '<div style="width:40px; height:1px; background:var(--border); margin:0 auto 16px;"></div>'
              + '<div style="font-size:0.68rem; letter-spacing:0.2em; color:#777; font-family:inherit;">OPTIONAL — もっと詳しく</div>'
              + '</div>';

        // 避けたいスタイル + NG行動をまとめる
        var avoidItems = [fd.avoid];
        for (var na = 0; na < ngActions.length; na++) {
          avoidItems.push(ngActions[na]);
        }
        var ngCombinedHtml = '<ul style="list-style:none; padding:0; margin:0; font-family:inherit;">';
        for (var ai = 0; ai < avoidItems.length; ai++) {
          ngCombinedHtml += '<li style="color:#ddd; font-size:0.85rem; padding:6px 0; padding-left:20px; position:relative; font-family:inherit;"><span style="position:absolute; left:0; color:#e74c3c;">✗</span>' + avoidItems[ai] + '</li>';
        }
        ngCombinedHtml += '</ul>';
        html += QuizEngine.resultCard('NG ─ 避けたいこと', ngCombinedHtml);

        // おでこ別アドバイス
        var foreheadTip = '';
        if (result.forehead === 'wide') {
          foreheadTip = '前髪で隠すスタイルがおすすめ。重めバングやマッシュ系で額をカバーすると小顔効果も。';
        } else if (result.forehead === 'narrow') {
          foreheadTip = 'アップバングで額を見せるスタイルが◎。おでこが狭いからこそ上げた方がバランスが取れます。';
        } else {
          foreheadTip = 'おでこの広さは標準的。上げても下ろしてもバランスが取りやすい。好みで選んでOK。';
        }
        html += QuizEngine.resultCard('おでこ別アドバイス', '<p style="font-family:inherit;">' + foreheadTip + '</p>');

        // 参考芸能人
        html += QuizEngine.resultCard('同じ顔型の芸能人', '<p style="font-family:inherit;">' + fd.celebs + '</p>');

        // おすすめスタイル（ダブりだが補足として）
        var recHtml = '<ul style="list-style:none; padding:0; margin:0; font-family:inherit;">';
        for (var ri = 0; ri < fd.recommended.length; ri++) {
          recHtml += '<li style="color:#e0e0e0; font-size:0.85rem; padding:6px 0; padding-left:20px; position:relative; font-family:inherit;"><span style="position:absolute; left:0; color:var(--gold);">✓</span>' + fd.recommended[ri] + '</li>';
        }
        recHtml += '</ul>';
        html += QuizEngine.resultCard('他に似合うスタイル', recHtml);

        // Gated content
        html += QuizEngine.gatedBlock('あなた専用のヘアスタイル完全ガイド', '\
          <table class="menu-table">\
            <tr>\
              <th>内容</th>\
              <th>詳細</th>\
            </tr>\
            <tr>\
              <td><strong>美容院オーダー方法</strong></td>\
              <td>あなたの顔型に合わせた具体的な伝え方</td>\
            </tr>\
            <tr>\
              <td><strong>全スタイルカタログ</strong></td>\
              <td>顔型×印象タイプ別の厳選スタイル集</td>\
            </tr>\
            <tr>\
              <td><strong>パーマの要否アドバイス</strong></td>\
              <td>あなたの髪質・顔型に合った判断</td>\
            </tr>\
          </table>\
        ');

        return html;
      }
    });

    function getProductRecommendations(result) {
      var products = [];
      var vibe = result.vibe;
      var hairType = result.hairType;
      var faceShape = result.faceShape;

      // Determine likely style category
      var isShortStyle = (vibe === 'wild' || vibe === 'business');
      var isCenterPart = (vibe === 'korean' || vibe === 'natural');
      var isPermStyle = (hairType === 'curly' || faceShape === 'long' || faceShape === 'square' || faceShape === 'inverted');
      var isMashStyle = (faceShape === 'round' || faceShape === 'oval' || faceShape === 'inverted');

      if (isPermStyle && hairType === 'curly') {
        // パーマ・ダメージ毛
        products.push({
          name: '中野モデニカ 4番',
          desc: 'パーマ・くせ毛に最適。ウェット感を出しながら束感キープ。',
          url: 'https://nakano-online.com/shop/g/g12960/'
        });
      }

      if (isCenterPart && vibe === 'korean') {
        // センターパート × ツヤ系
        products.push({
          name: 'モデニカ ナチュラルJ',
          desc: 'センターパートに最適。自然なツヤと軽いセット力。',
          url: 'https://nakano-online.com/shop/g/g13306/'
        });
      } else if (isCenterPart && vibe === 'natural') {
        // センターパート × マット
        products.push({
          name: 'アリミノメン ハードバーム',
          desc: 'マットな質感でナチュラルなセンターパートに。',
          url: 'https://www.arimino.co.jp/products/men/hard_balm/'
        });
      }

      if (isMashStyle && !isShortStyle && products.length < 2) {
        // マッシュ系
        products.push({
          name: '中野モデニカ 6番',
          desc: 'マット仕上げで馴染み良し。マッシュ系スタイルに最適。',
          url: 'https://nakano-online.com/shop/g/g12961/'
        });
      }

      if (isShortStyle && vibe === 'wild') {
        // 短髪×ツヤ系
        products.push({
          name: 'アリミノメン グリース',
          desc: 'ツヤ感のある短髪スタイルに。ワイルドな束感。',
          url: 'https://www.arimino.co.jp/products/men/freeze_keep_grease/'
        });
      }

      if (isShortStyle && vibe === 'business') {
        // 短髪系
        products.push({
          name: '中野モデニカ 8番',
          desc: 'ハードなセット力。ビジネスシーンの短髪スタイルに。',
          url: 'https://nakano-online.com/shop/g/g12962/'
        });
      }

      // Fallback: ensure at least 1 product
      if (products.length === 0) {
        products.push({
          name: '中野モデニカ 6番',
          desc: 'マット仕上げで馴染み良し。迷ったらまずこれ。',
          url: 'https://nakano-online.com/shop/g/g12961/'
        });
      }

      // Limit to 2 products
      return products.slice(0, 2);
    }
  </script>
