<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>男磨きプロファイル診断 | Men's Rise</title>
  <meta name="description" content="8つの質問であなたの男磨きプロファイルを作成。あなたに最適な診断をおすすめします。">
  <link rel="stylesheet" href="css/style.css?v=202604230300">
</head>
<body>
  <div id="app"></div>

  <script src="js/config.js?v=202604230300"></script>
  <script src="js/database.js?v=202604230300"></script>
  <script src="js/cta-variants.js?v=202604230300"></script>
  <script src="js/icons.js?v=202604230300"></script>
  <script src="js/quiz-engine.js?v=202604230300"></script>
  <script>
    new QuizEngine({
      diagnosisId: 'phase',
      iconSvg: MR_ICONS.phase,
      title: '男磨きプロファイル診断',
      description: 'あなたを知る → あなたに最適な診断がわかる。<br>8つの質問で今のあなたを整理します。',
      meta: '所要時間：約1分 ｜ 全8問',

      questions: [
        {
          id: 'age',
          sharedKey: 'age',
          text: '年齢を教えてください',
          type: 'number',
          fields: [
            { key: 'age', label: '', placeholder: '25', suffix: '歳' }
          ]
        },
        {
          id: 'budget',
          text: '毎月、男磨きにかけている予算は？',
          options: [
            { label: '3,000円以内', value: 'minimal' },
            { label: '3,000〜10,000円', value: 'low' },
            { label: '10,000〜30,000円', value: 'mid' },
            { label: '30,000円以上', value: 'high' }
          ]
        },
        {
          id: 'history',
          text: '男磨き歴はどれくらい？',
          options: [
            { label: 'これから始める', value: 'beginner' },
            { label: '半年未満', value: 'half' },
            { label: '半年〜1年', value: 'oneyear' },
            { label: '1年以上', value: 'veteran' }
          ]
        },
        {
          id: 'worry',
          text: '今の一番の悩みは？',
          options: [
            { label: '外見に自信がない', value: 'looks' },
            { label: '女性と話せない', value: 'communication' },
            { label: '何から始めていいかわからない', value: 'lost' },
            { label: 'やってるのに変わらない', value: 'plateau' }
          ]
        },
        {
          id: 'habit',
          text: '毎日続けてる習慣はある？',
          hint: '当てはまるものを全て選んでください',
          type: 'multi-select',
          maxSelect: 6,
          options: [
            { label: '筋トレ', value: 'gym' },
            { label: 'スキンケア', value: 'skin' },
            { label: '食事管理', value: 'diet' },
            { label: '読書', value: 'reading' },
            { label: 'ジャーナリング・瞑想', value: 'journal' },
            { label: '特にない', value: 'none' }
          ]
        },
        {
          id: 'confidence',
          text: '自分に自信はある？',
          options: [
            { label: '全然ない', value: 'zero' },
            { label: '少しだけ', value: 'little' },
            { label: 'まあまあ', value: 'moderate' },
            { label: 'ある', value: 'yes' }
          ]
        },
        {
          id: 'peers',
          text: '周りに男磨きしてる仲間は？',
          options: [
            { label: 'いない', value: 'none' },
            { label: '1〜2人', value: 'few' },
            { label: 'いる', value: 'yes' }
          ]
        },
        {
          id: 'change',
          text: '今の生活で一番変えたいことは？',
          options: [
            { label: '見た目', value: 'looks' },
            { label: '恋愛', value: 'love' },
            { label: '人間関係', value: 'relations' },
            { label: '仕事', value: 'work' },
            { label: '全部', value: 'all' }
          ]
        }
      ],

      calcResult: function(answers) {
        var worry = answers.worry;
        var change = answers.change;
        var history = answers.history;
        var confidence = answers.confidence;
        var habitArr = Array.isArray(answers.habit) ? answers.habit : (answers.habit ? [answers.habit] : []);
        var hasHabit = habitArr.length > 0 && !habitArr.includes('none');

        var DIAG = {
          kintore:  { label: '筋トレ診断',       to: 'shindan1-kintore.html' },
          hada:     { label: '肌質診断',         to: 'shindan2-hada.html'    },
          kamigata: { label: '髪型診断',         to: 'shindan3-kamigata.html'},
          fashion:  { label: 'ファッション診断', to: 'shindan4-fashion.html' }
        };

        var recs = [];
        function push(key, reason) {
          if (!recs.find(function(r) { return r.key === key; })) {
            recs.push({
              key: key,
              reason: reason,
              label: DIAG[key].label,
              to: DIAG[key].to
            });
          }
        }

        // 最重要：一番の悩み
        if (worry === 'looks') {
          push('fashion', '外見の自信のなさは、服でシルエットを整えると最短で変わる。');
          push('kamigata', '顔型に合う髪型に変えるだけで、第一印象が激変する。');
        } else if (worry === 'communication') {
          push('kamigata', '印象が変われば、話しかけられ方が変わる。自信は後からついてくる。');
          push('fashion', '清潔感のあるコーデが"話しかけやすい雰囲気"を作る。');
        } else if (worry === 'lost') {
          push('hada', '一番成功体験を作りやすい。今日から始められる、パッと変わる。');
          push('kintore', '体が変われば、一番深いところの自信が変わる。');
        } else if (worry === 'plateau') {
          push('kintore', '数字で成長を可視化すると、停滞感が消える。TDEE・PFCを出してみよう。');
          push('fashion', '外見が変わったなら、その体を活かすコーデに進化させよう。');
        }

        // 変えたい領域で補強
        if (change === 'love') {
          push('kamigata', '恋愛文脈ではまず見た目の印象が全て。髪型で殴る。');
          push('fashion', 'デート服の鉄板を押さえると、失敗がなくなる。');
        } else if (change === 'looks') {
          push('fashion', '見た目の変化は服が一番早い。今週末から着れる。');
        } else if (change === 'all' && recs.length < 2) {
          push('kintore', '全部変えたいなら、体という土台から。');
          push('hada', '肌はパッと変わる。最初の成功体験に。');
        }

        // Fallback
        if (recs.length === 0) {
          push('kintore', '体が変われば全部変わる。まず土台から。');
          push('hada', '今日から始められる、一番簡単な改善。');
        }

        return {
          recs: recs.slice(0, 2),
          profile: {
            history: history,
            worry: worry,
            change: change,
            confidence: confidence,
            budget: answers.budget,
            peers: answers.peers,
            hasHabit: hasHabit,
            habitArr: habitArr,
            age: answers.age
          }
        };
      },

      renderResult: function(result, answers) {
        var p = result.profile;

        var HISTORY_LABEL = { beginner:'これから始める', half:'半年未満', oneyear:'半年〜1年', veteran:'1年以上' };
        var WORRY_LABEL = { looks:'外見に自信がない', communication:'女性と話せない', lost:'何から始めていいか', plateau:'やってるのに変わらない' };
        var CHANGE_LABEL = { looks:'見た目', love:'恋愛', relations:'人間関係', work:'仕事', all:'全部' };
        var CONF_LABEL = { zero:'全然ない', little:'少しだけ', moderate:'まあまあ', yes:'ある' };
        var BUDGET_LABEL = { minimal:'3,000円以内', low:'3,000〜10,000円', mid:'10,000〜30,000円', high:'30,000円以上' };
        var PEERS_LABEL = { none:'いない', few:'1〜2人', yes:'いる' };
        var HABIT_LABEL = { gym:'筋トレ', skin:'スキンケア', diet:'食事管理', reading:'読書', journal:'ジャーナリング・瞑想', none:'特にない' };

        var habitText;
        if (p.habitArr.length === 0) habitText = '（回答なし）';
        else if (p.habitArr.indexOf('none') >= 0) habitText = 'まだない';
        else habitText = p.habitArr.map(function(v) { return HABIT_LABEL[v] || v; }).join('・');

        var html = '';

        // Result header
        html += '<div class="result-header">';
        html += '<div class="result-label">YOUR PROFILE</div>';
        html += '<div class="result-type">あなたの男磨きプロファイル</div>';
        html += '</div>';

        // プロファイル要約
        var profileBody = '<div style="display:grid; gap:10px;">';
        var rows = [
          ['男磨き歴',     HISTORY_LABEL[p.history] || '-'],
          ['今の一番の悩み', WORRY_LABEL[p.worry] || '-'],
          ['変えたい領域', CHANGE_LABEL[p.change] || '-'],
          ['今の自信',     CONF_LABEL[p.confidence] || '-'],
          ['月の予算感',   BUDGET_LABEL[p.budget] || '-'],
          ['続けてる習慣', habitText],
          ['周りの仲間',   PEERS_LABEL[p.peers] || '-']
        ];
        rows.forEach(function(r) {
          profileBody += '<div style="display:flex; gap:14px; padding:10px 12px; background:var(--bg-elevated); border-radius:8px; font-size:0.82rem;">'
            + '<span style="min-width:96px; color:var(--text-muted); font-size:0.74rem; letter-spacing:0.04em;">' + r[0] + '</span>'
            + '<span style="color:#f0f0f0; flex:1; line-height:1.5;">' + r[1] + '</span>'
            + '</div>';
        });
        profileBody += '</div>';
        html += QuizEngine.resultCard('あなたの現状サマリー', profileBody);

        // 一言メッセージ
        var msg = '';
        if (p.worry === 'lost' || p.history === 'beginner') {
          msg = 'まず1つ、小さく始めよう。迷ってる間に1ヶ月が過ぎる。';
        } else if (p.worry === 'plateau') {
          msg = '努力は足りてる。足りてないのは"正しい方向"だけ。';
        } else if (p.worry === 'looks') {
          msg = '外見は、変えようと思えば今週中に変えられる。';
        } else if (p.worry === 'communication') {
          msg = '話せないのは性格じゃない。印象を整えれば、話す機会が増える。';
        } else {
          msg = 'あなたは既に動き始めてる。あとは優先順位を間違えないこと。';
        }
        html += '<div class="result-highlight">' + msg + '</div>';

        // あなたに最適な診断（メインの出力）
        var recsHtml = '<p style="color:#ccc; font-size:0.84rem; margin-bottom:14px;">プロファイルから判断すると、次にやるべきはこの診断。タップしてすぐ受けよう。</p>';
        result.recs.forEach(function(r, i) {
          var rank = (i === 0 ? '最優先' : '次に');
          recsHtml += ''
            + '<a href="' + r.to + '" style="display:block; padding:16px 18px; background:var(--bg-elevated); border:1px solid var(--gold); border-radius:var(--radius-md); text-decoration:none; margin-bottom:10px;">'
            +   '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">'
            +     '<span style="color:var(--gold); font-size:1rem; font-weight:700;">'
            +       '【' + rank + '】' + r.label
            +     '</span>'
            +     '<span style="color:var(--gold); font-size:0.78rem;">受ける →</span>'
            +   '</div>'
            +   '<div style="color:#e0e0e0; font-size:0.78rem; line-height:1.6;">' + r.reason + '</div>'
            + '</a>';
        });
        html += QuizEngine.resultCard('あなたに最適な診断', recsHtml);

        return html;
      }
    });
  </script>
</body>
</html>
