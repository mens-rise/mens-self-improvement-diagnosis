<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>男磨きフェーズ診断 | Men's Rise</title>
  <meta name="description" content="今のあなたのフェーズと次にやるべき診断がわかる。8つの質問で最適な次の一手を診断します。">
  <link rel="stylesheet" href="css/style.css?v=202604230300">
</head>
<body>
  <div id="app"></div>

  <script src="js/config.js?v=202604230300"></script>
  <script src="js/database.js?v=202604230300"></script>
  <script src="js/cta-variants.js?v=202604230300"></script>
  <script src="js/icons.js?v=202604230300"></script>
  <script src="js/quiz-engine.js?v=202604230300"></script>
  <script>
    new QuizEngine({
      diagnosisId: 'phase',
      iconSvg: MR_ICONS.phase,
      title: '男磨きフェーズ診断',
      description: '今のあなたのフェーズと、次にやるべき診断がわかる。<br>8つの質問で最適な一手を見つけよう。',
      meta: '所要時間：約1分 ｜ 全8問',

      questions: [
        {
          id: 'age',
          sharedKey: 'age',
          text: '年齢を教えてください',
          type: 'number',
          fields: [
            { key: 'age', label: '', placeholder: '25', suffix: '歳' }
          ]
        },
        {
          id: 'budget',
          text: '毎月、男磨きにかけている予算は？',
          options: [
            { label: '3,000円以内', value: 'minimal' },
            { label: '3,000〜10,000円', value: 'low' },
            { label: '10,000〜30,000円', value: 'mid' },
            { label: '30,000円以上', value: 'high' }
          ]
        },
        {
          id: 'history',
          text: '男磨き歴はどれくらい？',
          options: [
            { label: 'これから始める', value: 'beginner' },
            { label: '半年未満', value: 'half' },
            { label: '半年〜1年', value: 'oneyear' },
            { label: '1年以上', value: 'veteran' }
          ]
        },
        {
          id: 'worry',
          text: '今の一番の悩みは？',
          options: [
            { label: '外見に自信がない', value: 'looks' },
            { label: '女性と話せない', value: 'communication' },
            { label: '何から始めていいかわからない', value: 'lost' },
            { label: 'やってるのに変わらない', value: 'plateau' }
          ]
        },
        {
          id: 'habit',
          text: '毎日続けてる習慣はある？',
          hint: '当てはまるものを全て選んでください',
          type: 'multi-select',
          maxSelect: 6,
          options: [
            { label: '筋トレ', value: 'gym' },
            { label: 'スキンケア', value: 'skin' },
            { label: '食事管理', value: 'diet' },
            { label: '読書', value: 'reading' },
            { label: 'ジャーナリング・瞑想', value: 'journal' },
            { label: '特にない', value: 'none' }
          ]
        },
        {
          id: 'confidence',
          text: '自分に自信はある？',
          options: [
            { label: '全然ない', value: 'zero' },
            { label: '少しだけ', value: 'little' },
            { label: 'まあまあ', value: 'moderate' },
            { label: 'ある', value: 'yes' }
          ]
        },
        {
          id: 'peers',
          text: '周りに男磨きしてる仲間は？',
          options: [
            { label: 'いない', value: 'none' },
            { label: '1〜2人', value: 'few' },
            { label: 'いる', value: 'yes' }
          ]
        },
        {
          id: 'change',
          text: '今の生活で一番変えたいことは？',
          options: [
            { label: '見た目', value: 'looks' },
            { label: '恋愛', value: 'love' },
            { label: '人間関係', value: 'relations' },
            { label: '仕事', value: 'work' },
            { label: '全部', value: 'all' }
          ]
        }
      ],

      calcResult: function(answers) {
        var history = answers.history;
        var worry = answers.worry;
        var confidence = answers.confidence;
        var peers = answers.peers;
        var habitArr = Array.isArray(answers.habit) ? answers.habit : (answers.habit ? [answers.habit] : []);
        var hasHabit = habitArr.length > 0 && habitArr.indexOf('none') < 0;

        // Phase判定（旧ロジック踏襲）
        var phase = 2;
        if (history === 'beginner' &&
            (worry === 'lost' || worry === 'looks') &&
            (confidence === 'zero' || confidence === 'little') &&
            !hasHabit) {
          phase = 1;
        } else if ((history === 'beginner' || history === 'half') &&
            hasHabit &&
            (confidence === 'little' || confidence === 'moderate')) {
          phase = 2;
        } else if ((history === 'half' || history === 'oneyear') &&
            worry === 'plateau' &&
            confidence === 'moderate') {
          phase = 3;
        } else if ((history === 'oneyear' || history === 'veteran') &&
            worry === 'plateau' &&
            (confidence === 'zero' || confidence === 'little')) {
          phase = 4;
        } else if (history === 'veteran' &&
            (confidence === 'moderate' || confidence === 'yes') &&
            peers === 'yes') {
          phase = 5;
        } else if (history === 'beginner') {
          phase = 1;
        } else if (history === 'half') {
          phase = 2;
        } else if (history === 'oneyear') {
          phase = (worry === 'plateau')
            ? ((confidence === 'moderate' || confidence === 'yes') ? 3 : 4)
            : 2;
        } else if (history === 'veteran') {
          phase = (confidence === 'moderate' || confidence === 'yes') ? 5 : 4;
        }

        return {
          phase: phase,
          profile: {
            history: history, worry: worry,
            change: answers.change, confidence: confidence,
            budget: answers.budget, peers: peers,
            hasHabit: hasHabit, habitArr: habitArr,
            age: answers.age
          }
        };
      },

      renderResult: function(result, answers) {
        var phase = result.phase;
        var p = result.profile;

        var PHASE_DATA = {
          1: {
            label: '① なんかモテたい期',
            feature: '漠然とした不満があるけど、何から始めていいかわからない。',
            message: 'まず外見の1つを変えてみよう。眉毛か黒パンツから。そこから全部が始まる。',
            recs: [
              { key:'hada', label:'肌質診断', to:'shindan2-hada.html', reason:'最初の成功体験を作りやすい。パッと変わる。' },
              { key:'kintore', label:'筋トレ診断', to:'shindan1-kintore.html', reason:'体が変われば自信が変わる。基礎の土台。' }
            ]
          },
          2: {
            label: '② 外見改造期',
            feature: '服・髪・肌に目覚め始めた段階。今が一番伸びる時期。',
            message: '他の診断を全部やって、自分専用のロードマップを作ってみよう。',
            recs: [
              { key:'fashion', label:'ファッション診断', to:'shindan4-fashion.html', reason:'外見改造期は服でシルエットが激変する。最も効果が出やすい。' },
              { key:'kamigata', label:'髪型診断', to:'shindan3-kamigata.html', reason:'顔型に合った髪型に変えるだけで印象が一気に変わる。' }
            ]
          },
          3: {
            label: '③ テクニック収集期',
            feature: '知識は増えたが空回りしている。',
            message: '情報はもう十分。足りないのは実践と環境。行動量を増やす仕組みを作ろう。',
            recs: [
              { key:'kintore', label:'筋トレ診断', to:'shindan1-kintore.html', reason:'頭で考えるより体を動かす。数値目標が行動を引き出す。' }
            ]
          },
          4: {
            label: '④ 自信迷子期',
            feature: 'やってるのに変わらない。外見は変わったが自信がない。',
            message: '外見は土台。次は"在り方"。自分との約束を守る習慣を始めてみよう。',
            recs: [
              { key:'kintore', label:'筋トレ診断', to:'shindan1-kintore.html', reason:'自信の土台は身体。小さな達成（重量更新・体重変化）が効く。' }
            ]
          },
          5: {
            label: '⑤ 本質到達期',
            feature: '自分軸で動けている。言うことなし。',
            message: '目の前のやるべきことを、ひとつずつ積み上げていこう。',
            recs: [
              { key:'kintore', label:'筋トレ診断', to:'shindan1-kintore.html', reason:'現状維持を脱するには新しい負荷を。数値目標を再設定しよう。' }
            ]
          }
        };
        var d = PHASE_DATA[phase];

        var HISTORY_LABEL = { beginner:'これから始める', half:'半年未満', oneyear:'半年〜1年', veteran:'1年以上' };
        var WORRY_LABEL = { looks:'外見に自信がない', communication:'女性と話せない', lost:'何から始めていいか', plateau:'やってるのに変わらない' };
        var CHANGE_LABEL = { looks:'見た目', love:'恋愛', relations:'人間関係', work:'仕事', all:'全部' };
        var CONF_LABEL = { zero:'全然ない', little:'少しだけ', moderate:'まあまあ', yes:'ある' };
        var BUDGET_LABEL = { minimal:'3,000円以内', low:'3,000〜10,000円', mid:'10,000〜30,000円', high:'30,000円以上' };
        var PEERS_LABEL = { none:'いない', few:'1〜2人', yes:'いる' };
        var HABIT_LABEL = { gym:'筋トレ', skin:'スキンケア', diet:'食事管理', reading:'読書', journal:'ジャーナリング・瞑想', none:'特にない' };

        var habitText;
        if (p.habitArr.length === 0) habitText = '（回答なし）';
        else if (p.habitArr.indexOf('none') >= 0) habitText = 'まだない';
        else habitText = p.habitArr.map(function(v) { return HABIT_LABEL[v] || v; }).join('・');

        var html = '';

        // Result header - フェーズ表示
        html += '<div class="result-header">';
        html += '<div class="result-label">YOUR PHASE</div>';
        html += '<div class="result-type">' + d.label + '</div>';
        html += '</div>';

        // フェーズ説明カード
        html += QuizEngine.resultCard('今のあなたのフェーズ', d.feature);

        // メッセージハイライト
        html += '<div class="result-highlight">' + d.message + '</div>';

        // 最適な次の診断（メインアウトプット）
        var recsHtml = '<p style="color:#ccc; font-size:0.84rem; margin-bottom:14px;">' + d.label + 'のあなたに一番効くのはこの診断。タップしてすぐ受けよう。</p>';
        d.recs.forEach(function(r, i) {
          var rank = (d.recs.length > 1) ? (i === 0 ? '【最優先】' : '【次に】') : '【おすすめ】';
          recsHtml += ''
            + '<a href="' + r.to + '" style="display:block; padding:16px 18px; background:var(--bg-elevated); border:1px solid var(--gold); border-radius:var(--radius-md); text-decoration:none; margin-bottom:10px;">'
            +   '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">'
            +     '<span style="color:var(--gold); font-size:1rem; font-weight:700;">'
            +       rank + r.label
            +     '</span>'
            +     '<span style="color:var(--gold); font-size:0.78rem;">受ける →</span>'
            +   '</div>'
            +   '<div style="color:#e0e0e0; font-size:0.78rem; line-height:1.6;">' + r.reason + '</div>'
            + '</a>';
        });
        html += QuizEngine.resultCard('次にやるべき診断', recsHtml);

        // プロファイル要約
        var profileBody = '<div style="display:grid; gap:10px;">';
        var rows = [
          ['男磨き歴',     HISTORY_LABEL[p.history] || '-'],
          ['今の一番の悩み', WORRY_LABEL[p.worry] || '-'],
          ['変えたい領域', CHANGE_LABEL[p.change] || '-'],
          ['今の自信',     CONF_LABEL[p.confidence] || '-'],
          ['月の予算感',   BUDGET_LABEL[p.budget] || '-'],
          ['続けてる習慣', habitText],
          ['周りの仲間',   PEERS_LABEL[p.peers] || '-']
        ];
        rows.forEach(function(r) {
          profileBody += '<div style="display:flex; gap:14px; padding:10px 12px; background:var(--bg-elevated); border-radius:8px; font-size:0.82rem;">'
            + '<span style="min-width:96px; color:var(--text-muted); font-size:0.74rem; letter-spacing:0.04em;">' + r[0] + '</span>'
            + '<span style="color:#f0f0f0; flex:1; line-height:1.5;">' + r[1] + '</span>'
            + '</div>';
        });
        profileBody += '</div>';
        html += QuizEngine.resultCard('あなたの現状サマリー', profileBody);

        return html;
      }
    });
  </script>
</body>
</html>
