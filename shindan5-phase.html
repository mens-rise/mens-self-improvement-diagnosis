<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>男磨きフェーズ診断 | Men's Rise</title>
  <meta name="description" content="今のあなたに本当に必要なことがわかる。6つの質問に答えるだけで、男磨きのフェーズを診断します。">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app"></div>

  <script src="js/config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/cta-variants.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/quiz-engine.js"></script>
  <script>
    new QuizEngine({      diagnosisId: 'phase',
      iconSvg: MR_ICONS.phase,
      title: '男磨きフェーズ診断',
      description: '今のあなたに本当に必要なことがわかる。<br>6つの質問に答えるだけ。',
      meta: '所要時間：約1分 ｜ 全8問',

      questions: [
        {
          id: 'age',
          sharedKey: 'age',
          text: '年齢を教えてください',
          type: 'number',
          fields: [
            { key: 'age', label: '', placeholder: '25', suffix: '歳' }
          ]
        },
        {
          id: 'budget',
          text: '毎月、男磨きにかけている予算は？',
          options: [
            { label: '3,000円以内', value: 'minimal' },
            { label: '3,000〜10,000円', value: 'low' },
            { label: '10,000〜30,000円', value: 'mid' },
            { label: '30,000円以上', value: 'high' }
          ]
        },
        {
          id: 'history',
          text: '男磨き歴はどれくらい？',
          options: [
            { label: 'これから始める', value: 'beginner' },
            { label: '半年未満', value: 'half' },
            { label: '半年〜1年', value: 'oneyear' },
            { label: '1年以上', value: 'veteran' }
          ]
        },
        {
          id: 'worry',
          text: '今の一番の悩みは？',
          options: [
            { label: '外見に自信がない', value: 'looks' },
            { label: '女性と話せない', value: 'communication' },
            { label: '何から始めていいかわからない', value: 'lost' },
            { label: 'やってるのに変わらない', value: 'plateau' }
          ]
        },
        {
          id: 'habit',
          text: '毎日続けてる習慣はある？',
          options: [
            { label: '筋トレ', value: 'gym' },
            { label: 'スキンケア', value: 'skin' },
            { label: '読書', value: 'reading' },
            { label: '特にない', value: 'none' }
          ]
        },
        {
          id: 'confidence',
          text: '自分に自信はある？',
          options: [
            { label: '全然ない', value: 'zero' },
            { label: '少しだけ', value: 'little' },
            { label: 'まあまあ', value: 'moderate' },
            { label: 'ある', value: 'yes' }
          ]
        },
        {
          id: 'peers',
          text: '周りに男磨きしてる仲間は？',
          options: [
            { label: 'いない', value: 'none' },
            { label: '1〜2人', value: 'few' },
            { label: 'いる', value: 'yes' }
          ]
        },
        {
          id: 'change',
          text: '今の生活で一番変えたいことは？',
          options: [
            { label: '見た目', value: 'looks' },
            { label: '恋愛', value: 'love' },
            { label: '人間関係', value: 'relations' },
            { label: '仕事', value: 'work' },
            { label: '全部', value: 'all' }
          ]
        }
      ],

      calcResult: function(answers) {
        var history = answers.history;
        var worry = answers.worry;
        var habit = answers.habit;
        var confidence = answers.confidence;
        var peers = answers.peers;

        // Phase 1: なんかモテたい期
        if (history === 'beginner' &&
            (worry === 'lost' || worry === 'looks') &&
            (confidence === 'zero' || confidence === 'little') &&
            habit === 'none') {
          return 1;
        }

        // Phase 2: 外見改造期
        if ((history === 'beginner' || history === 'half') &&
            habit !== 'none' &&
            (confidence === 'little' || confidence === 'moderate')) {
          return 2;
        }

        // Phase 3: テクニック収集期
        if ((history === 'half' || history === 'oneyear') &&
            worry === 'plateau' &&
            confidence === 'moderate') {
          return 3;
        }

        // Phase 4: 自信迷子期
        if ((history === 'oneyear' || history === 'veteran') &&
            worry === 'plateau' &&
            (confidence === 'zero' || confidence === 'little')) {
          return 4;
        }

        // Phase 5: 本質到達期
        if (history === 'veteran' &&
            (confidence === 'moderate' || confidence === 'yes') &&
            peers === 'yes') {
          return 5;
        }

        // Fallback logic
        if (history === 'beginner') {
          return 1;
        }
        if (history === 'half') {
          return 2;
        }
        if (history === 'oneyear') {
          if (worry === 'plateau') {
            return (confidence === 'moderate' || confidence === 'yes') ? 3 : 4;
          }
          return 2;
        }
        if (history === 'veteran') {
          return (confidence === 'moderate' || confidence === 'yes') ? 5 : 4;
        }

        return 2;
      },

      renderResult: function(phase, answers) {
        var data = {
          1: {
            type: '\u2460 \u306a\u3093\u304b\u30e2\u30c6\u305f\u3044\u671f',
            feature: '\u6f20\u7136\u3068\u3057\u305f\u4e0d\u6e80\u304c\u3042\u308b\u3002\u4f55\u304b\u3089\u59cb\u3081\u3066\u3044\u3044\u304b\u308f\u304b\u3089\u306a\u3044\u3002',
            message: 'まず外見の1つを変えろ。眉毛か黒パンツ。そこから始まる。',
            action: '眉毛サロンへ行け。今すぐ予約しろ。',
            nextDiagnosis: '→ まずは肌質診断・筋トレ診断からやってみろ',
            why: 'まだ行動に移せていない、もしくは何から始めるべきか判断材料が不足している状態。情報はネットにあふれているが、自分にとって「どれが正解か」を見極められていない。まずは1つでも始めることで、自分の傾向が見えてきます。',
            traps: '<ul><li>YouTubeを見ているだけで満足する</li><li>「お金がないから無理」と諦める</li><li>いきなり高額な商品を買って続かない</li><li>完璧な計画を立ててから始めようとする（結果スタートしない）</li></ul>',
            nextPhase: '<p><strong>次のフェーズ（②外見改造期）へ進むための条件</strong></p><ul><li>どれか1つを始める（スキンケアでも眉毛でも何でも）</li><li>1週間続ける</li><li>写真を撮る（ビフォー）</li><li>自分の「好き」を言語化する</li></ul>',
            future: '何から始めるかが明確になり、1つのルーティンが定着している。周りから「なんか変わった？」と言われる最初の段階。',
            gatedContent: '<p><strong>あなた専用のスタートダッシュプラン</strong></p><ul><li>Week 1: 眉毛サロン予約・スキンケア開始</li><li>Week 2: 黒パンツ購入・筋トレ開始</li><li>Week 3-4: 美容室予約・全身コーデ見直し</li><li>継続サポート・仲間環境のご案内</li></ul>'
          },
          2: {
            type: '\u2461 \u5916\u898b\u6539\u9020\u671f',
            feature: '服・髪・肌に目覚め始めた段階。今が一番伸びる時期。',
            message: '他の診断を全部やって、自分専用のロードマップを作れ。',
            action: 'カット4,000円以上のメンズ美容室へ行け。',
            nextDiagnosis: '→ ファッション診断をやれ',
            why: '行動を始めた段階。ファッション、髪型、スキンケアに興味を持ち、色々試している時期。ここで大事なのは「完璧を目指さない」こと。一気にすべて変えようとすると挫折します。1つずつ、着実に。',
            traps: '<ul><li>複数のジャンルに同時に手を出して挫折</li><li>他人のやり方をそのままコピーする</li><li>効果が出る前にアイテムを変える</li><li>写真を撮らない（変化が分からない）</li></ul>',
            nextPhase: '<p><strong>次のフェーズ（③テクニック収集期）へ進むための条件</strong></p><ul><li>3ヶ月以上1つのジャンルを続ける</li><li>最低5人から「変わったね」と言われる</li><li>自分なりのルーティンが固まる</li><li>次に何を学ぶべきか自問できるようになる</li></ul>',
            future: '外見に自信が持てるようになる。写真に写るのが嫌じゃなくなり、服を買うのが楽しみになる。デートや飲み会で堂々とできる。',
            gatedContent: '<p><strong>あなた専用の外見改造ロードマップ</strong></p><ul><li>Month 1: ヘアスタイル確立・スキンケアルーティン化</li><li>Month 2: ワードローブ構築・体型改善開始</li><li>Month 3: トータルコーデ完成・写真撮影</li><li>継続サポート・仲間環境のご案内</li></ul>'
          },
          3: {
            type: '\u2462 \u30c6\u30af\u30cb\u30c3\u30af\u53ce\u96c6\u671f',
            feature: '知識は増えたが空回りしている。',
            message: '情報はもう十分。足りないのは実践と環境。行動量を増やす仕組みを作れ。',
            action: '3ヶ月後の自分がどうなるか、今すぐ宣言しろ。',
            nextDiagnosis: '→ 筋トレ診断をやれ',
            why: '情報をたくさん集めたが、実行に移せていない状態。「知識」と「行動」の間に大きな壁がある時期。最も抜け出しにくい罠。情報収集は楽だけど、それだけでは何も変わりません。',
            traps: '<ul><li>SNSの情報を保存して見返さない</li><li>「いつか始めよう」の繰り返し</li><li>完璧な方法を探し続ける</li><li>行動しない自分を正当化する</li></ul>',
            nextPhase: '<p><strong>次のフェーズ（④自信迷子期）へ進むための条件</strong></p><ul><li>集めた情報の80%を実行に移す</li><li>「知ってる」を「できる」に変える</li><li>毎日同じ時間に同じ行動を繰り返す</li><li>3ヶ月間、誰かに宣言した目標を追う</li></ul>',
            future: '知識を行動に変えられるようになる。「やらない言い訳」をしなくなる。時間管理がうまくなる。',
            gatedContent: '<p><strong>あなた専用のブレイクスループラン</strong></p><ul><li>行動計画: 週3回の実践タスク設計</li><li>環境設計: 同じフェーズの仲間とつながる</li><li>3ヶ月後の目標設定・進捗管理</li><li>継続サポート・仲間環境のご案内</li></ul>'
          },
          4: {
            type: '\u2463 \u81ea\u4fe1\u8ff7\u5b50\u671f',
            feature: 'やってるのに変わらない。外見は変わったが自信がない。',
            message: '外見は土台。次は"在り方"。自分との約束を守る習慣を始めろ。',
            action: 'モチベーションに頼るな。小さな自分との毎日の約束を5つ作って守れ。',
            nextDiagnosis: '→ もう一度筋トレ診断をやれ',
            why: '外見は整ってきたのに、なぜか自信が持てない状態。原因は「自分との約束を守っていないから」。小さな約束を毎日守る習慣が、本物の自信を作ります。',
            traps: '<ul><li>他人と比較する</li><li>小さな達成を無視する</li><li>「まだ足りない」と自分を責める</li><li>結果だけを見て過程を評価しない</li></ul>',
            nextPhase: '<p><strong>次のフェーズ（⑤本質到達期）へ進むための条件</strong></p><ul><li>自分との約束を5つ作り、毎日守る</li><li>他人との比較を手放す</li><li>自分の価値観を言語化する</li><li>小さな達成を毎日認める</li></ul>',
            future: '他人の評価に左右されなくなる。自分の基準で動ける。毎朝起きるのが楽しくなる。',
            gatedContent: '<p><strong>あなた専用の自信構築プラン</strong></p><ul><li>毎日の5つの約束設計サポート</li><li>マインドセット改善ワーク</li><li>行動記録・振り返りテンプレート</li><li>継続サポート・仲間環境のご案内</li></ul>'
          },
          5: {
            type: '\u2464 \u672c\u8cea\u5230\u9054\u671f',
            feature: '自分軸で動けている。言うことなし。',
            message: '目の前のやるべきことを積み上げろ。',
            action: '今のペースを崩すな。積み上げろ。',
            nextDiagnosis: '→ 筋トレ診断で現状チェック',
            why: '自分軸で動けている状態。何をすべきかが明確で、継続できている。ここまで来たら、あとは積み上げるだけ。停滞を感じたら、また新しい目標を見つけるタイミングです。',
            traps: '<ul><li>現状維持に満足する</li><li>新しい挑戦を避ける</li><li>後輩を育てない（与える側に回らない）</li><li>謙虚さを失う</li></ul>',
            nextPhase: '<p><strong>さらなる成長のための条件</strong></p><ul><li>誰かの力になる（教える、支える）</li><li>新しい分野に挑戦する</li><li>経験を発信する</li><li>コミュニティを作る</li></ul>',
            future: '周りから相談される立場に。人に影響を与えられるようになる。自分の次の目標が自然と見つかる。',
            gatedContent: '<p><strong>あなた専用のネクストステージプラン</strong></p><ul><li>現状維持・さらなる成長のためのロードマップ</li><li>後輩へのメンタリング機会</li><li>ハイレベルな仲間環境への招待</li><li>継続サポート・限定コミュニティのご案内</li></ul>'
          }
        };

        var d = data[phase];

        var html = '';

        // Result header
        html += '<div class="result-header">';
        html += '<div class="result-label">YOUR PHASE</div>';
        html += '<div class="result-type">' + d.type + '</div>';
        html += '</div>';

        // Feature card
        html += QuizEngine.resultCard('あなたの特徴', d.feature);

        // Message highlight
        html += '<div class="result-highlight">' + d.message + '</div>';

        // Today's action card
        html += QuizEngine.resultCard('今日やるべきこと', d.action);

        // Next diagnosis card
        html += QuizEngine.resultCard('次にやるべき診断', d.nextDiagnosis);

        // WHY card
        html += QuizEngine.resultCard('なぜあなたはこのフェーズにいるのか', d.why);

        // Traps card
        html += QuizEngine.resultCard('このフェーズで陥りがちな罠（NG行動）', d.traps);

        // Next phase conditions card
        html += QuizEngine.resultCard('次の段階へ進むための条件', d.nextPhase);

        // 3 months future image card
        html += QuizEngine.resultCard('3ヶ月後の変化イメージ', d.future);

        // Gated section
        html += QuizEngine.gatedBlock('あなた専用のロードマップ', d.gatedContent);

        return html;
      }
    });
  </script>
</body>
</html>
