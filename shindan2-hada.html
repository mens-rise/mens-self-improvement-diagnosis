<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>肌質診断 | Men's Rise</title>
  <link rel="stylesheet" href="css/style.css?v=202604171736">
</head>
<body>
  <div id="app"></div>
  <script src="js/config.js?v=202604171736"></script>
  <script src="js/database.js?v=202604171736"></script>
  <script src="js/cta-variants.js?v=202604171736"></script>
  <script src="js/icons.js?v=202604171736"></script>
  <script src="js/hada-data.js?v=202604171736"></script>
  <script src="js/quiz-engine.js?v=202604171736"></script>
  <script>
    new QuizEngine({
      diagnosisId: 'hada',
      iconSvg: MR_ICONS.hada,
      title: '肌質タイプ別<br>スキンケア診断',
      description: 'あなたの肌質を診断して<br>最適なケア方法を提案します',
      meta: '所要時間：約2分 ｜ 全8問',

      questions: [
        {
          id: 'age',
          sharedKey: 'age',
          text: '年齢を教えてください',
          type: 'number',
          fields: [
            { key: 'age', label: '', placeholder: '28', suffix: '歳' }
          ]
        },
        {
          id: 'skinConcerns',
          text: '今の肌の悩みは？',
          hint: '当てはまるものを最大3つまで選んでください',
          type: 'multi-select',
          maxSelect: 3,
          options: [
            { label: 'ニキビ・吹き出物', value: 'acne' },
            { label: '毛穴の黒ずみ・開き', value: 'pores' },
            { label: '乾燥・カサつき', value: 'dryness' },
            { label: 'テカリ・脂っぽさ', value: 'oiliness' },
            { label: '赤み・肌荒れ', value: 'redness' },
            { label: 'シミ・くすみ', value: 'spots' },
            { label: 'ひげ剃り後のヒリつき', value: 'shaving' },
            { label: '特になし', value: 'none' }
          ]
        },
        {
          id: 'wash',
          text: '洗顔後、何もつけずに10分経つと？',
          hint: '洗顔後タオルで拭き、10分間何もせず待ってみて',
          options: [
            { label: '全体がつっぱる', value: 'tight' },
            { label: 'Tゾーンだけテカる', value: 't-zone' },
            { label: '全体がテカる', value: 'oily' },
            { label: '特に変化なし', value: 'normal' }
          ]
        },
        {
          id: 'acne',
          text: 'ニキビはできやすい？',
          options: [
            { label: 'よくできる', value: 'often' },
            { label: 'たまにできる', value: 'sometimes' },
            { label: 'ほとんどない', value: 'rarely' }
          ]
        },
        {
          id: 'redness',
          text: '肌の赤みやかゆみは？',
          options: [
            { label: 'よくある', value: 'often' },
            { label: 'たまにある', value: 'sometimes' },
            { label: 'ない', value: 'none' }
          ]
        },
        {
          id: 'sting',
          text: '化粧水をつけるとヒリヒリする？',
          options: [
            { label: 'よくする', value: 'often' },
            { label: 'たまにする', value: 'sometimes' },
            { label: 'しない', value: 'never' }
          ]
        },
        {
          id: 'current',
          text: '現在のスキンケアは？',
          hint: '当てはまるものを全て選んでください',
          type: 'multi-select',
          maxSelect: 8,
          options: [
            { label: '何もしてない', value: 'nothing' },
            { label: 'クレンジング', value: 'cleansing' },
            { label: '洗顔料', value: 'wash' },
            { label: '化粧水', value: 'lotion' },
            { label: '乳液', value: 'emulsion' },
            { label: '美容液', value: 'serum' },
            { label: 'クリーム', value: 'cream' },
            { label: '日焼け止め', value: 'sunscreen' }
          ]
        },
        {
          id: 'budget',
          text: '月のスキンケア予算は？',
          options: [
            { label: '3,000円以内', value: 'low' },
            { label: '5,000円以内', value: 'mid' },
            { label: '1万円以内', value: 'high' },
            { label: 'こだわらない', value: 'unlimited' }
          ]
        }
      ],

      calcResult: function(answers) {
        const wash = answers.wash;
        const acne = answers.acne;
        const redness = answers.redness;
        const sting = answers.sting;

        let type = 'normal';

        if (sting === 'often' && redness === 'often') {
          type = 'sensitive';
        } else if (wash === 'tight' && acne !== 'often' && sting !== 'often') {
          type = 'dry';
        } else if (wash === 'oily' && (acne === 'often' || acne === 'sometimes') && redness !== 'often') {
          type = 'oily';
        } else if (wash === 't-zone') {
          type = 'combination';
        } else if (wash === 'normal' && redness !== 'often' && sting !== 'often') {
          type = 'normal';
        } else {
          if (sting === 'often') type = 'sensitive';
          else if (wash === 'tight') type = 'dry';
          else if (wash === 'oily') type = 'oily';
          else if (wash === 't-zone') type = 'combination';
          else type = 'normal';
        }

        return {
          type: type,
          budget: answers.budget
        };
      },

      renderResult: function(result, answers) {
        const d = HADA_DATA[result.type];
        const products = HADA_PRODUCTS[result.type] || [];
        const routine = HADA_ROUTINES[result.type];
        const ng = HADA_NG[result.type] || [];
        const vision = HADA_VISION[result.type];
        const catColors = HADA_CAT_COLORS;

        let html = '';

        // ───────── ヘッダー ─────────
        html += `
          <div class="result-header">
            <div class="result-label">YOUR SKIN TYPE</div>
            <div class="result-type">${d.name}</div>
            <div class="result-subtitle">${d.tag}</div>
          </div>
        `;

        // ───────── ① 原因カード ─────────
        html += QuizEngine.resultCard(
          'CAUSE ─ あなたがこの肌質である理由',
          `<p style="line-height:1.85; font-family:inherit;">${d.cause}</p>`
        );

        // ───────── ② 正解アクション 見出し ─────────
        html += `
          <div style="text-align:center; margin:40px 0 20px;">
            <div style="font-size:0.75rem; letter-spacing:0.2em; color:var(--gold); margin-bottom:6px;">ACTION</div>
            <div style="font-size:1.1rem; font-weight:700; color:var(--white); font-family:inherit;">あなたの正解アクション</div>
            <div style="width:40px; height:1px; background:var(--gold); margin:16px auto 0;"></div>
          </div>
        `;

        // 2-1. 朝夜のルーティン
        let routineHtml = '<p style="font-size:0.82rem; color:#ccc; margin-bottom:16px; font-family:inherit;">塗る順番を守るのが最重要。水分→油分の順で。</p>';
        // 朝
        routineHtml += '<div style="margin-bottom:18px;"><div style="color:var(--gold); font-size:0.8rem; font-weight:700; margin-bottom:10px; font-family:inherit;">☀ 朝のルーティン</div>';
        routine.morning.forEach((step, i) => {
          routineHtml += `
            <div style="display:flex; align-items:center; gap:12px; padding:10px 12px; background:var(--bg-elevated); border-radius:8px; margin-bottom:6px;">
              <span style="display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:26px; border-radius:50%; background:rgba(200,169,110,0.15); color:var(--gold); font-weight:700; font-size:0.82rem; font-family:inherit;">${i + 1}</span>
              <span style="color:#f0f0f0; font-size:0.85rem; line-height:1.5; font-family:inherit;">${step}</span>
            </div>
          `;
        });
        routineHtml += '</div>';
        // 夜
        routineHtml += '<div><div style="color:var(--gold); font-size:0.8rem; font-weight:700; margin-bottom:10px; font-family:inherit;">🌙 夜のルーティン</div>';
        routine.night.forEach((step, i) => {
          routineHtml += `
            <div style="display:flex; align-items:center; gap:12px; padding:10px 12px; background:var(--bg-elevated); border-radius:8px; margin-bottom:6px;">
              <span style="display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:26px; border-radius:50%; background:rgba(200,169,110,0.15); color:var(--gold); font-weight:700; font-size:0.82rem; font-family:inherit;">${i + 1}</span>
              <span style="color:#f0f0f0; font-size:0.85rem; line-height:1.5; font-family:inherit;">${step}</span>
            </div>
          `;
        });
        routineHtml += '</div>';
        html += QuizEngine.resultCard('① 朝夜のケアルーティン', routineHtml);

        // 2-2. カテゴリ別おすすめ商品
        let prodHtml = '<p style="font-size:0.82rem; color:#ccc; margin-bottom:14px; font-family:inherit;">このセットを揃えれば、あなたのスキンケアは完結します。</p>';
        products.forEach(p => {
          const color = catColors[p.cat] || '#c8a96e';
          prodHtml += `
            <div style="margin-bottom:12px; padding:14px; background:var(--bg-elevated); border-radius:8px;">
              <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                <span style="display:inline-block; padding:3px 10px; background:${color}20; color:${color}; border:1px solid ${color}60; border-radius:20px; font-size:0.7rem; font-weight:700; font-family:inherit;">${p.cat}</span>
                <span style="color:var(--gold); font-size:0.78rem; font-weight:600; font-family:inherit; margin-left:auto;">${p.price}</span>
              </div>
              <div style="color:#fff; font-size:0.9rem; font-weight:700; margin-bottom:4px; font-family:inherit;">${p.name}</div>
              <div style="color:#c8c8c8; font-size:0.78rem; line-height:1.55; margin-bottom:8px; font-family:inherit;">${p.note}</div>
              <a href="${p.url}" target="_blank" rel="noopener" style="color:var(--gold); font-size:0.74rem; font-family:inherit;">Amazonで見る →</a>
            </div>
          `;
        });
        html += QuizEngine.resultCard('② あなたの肌質に合う商品（カテゴリ別）', prodHtml);

        // ───────── もっと詳しく（オプション） ─────────
        html += `
          <div style="text-align:center; margin:48px 0 20px;">
            <div style="width:40px; height:1px; background:var(--border); margin:0 auto 16px;"></div>
            <div style="font-size:0.68rem; letter-spacing:0.2em; color:#777; font-family:inherit;">OPTIONAL — もっと詳しく</div>
          </div>
        `;

        // NG
        const ngHtml = '<ul style="list-style:none; padding:0; margin:0;">' + ng.map(it => `<li style="color:#ddd; font-size:0.85rem; padding:6px 0; padding-left:20px; position:relative; font-family:inherit;"><span style="position:absolute; left:0; color:#e74c3c;">✗</span>${it}</li>`).join('') + '</ul>';
        html += QuizEngine.resultCard('NG ─ 避けたいこと', ngHtml);

        // 3ヶ月後
        html += QuizEngine.resultCard('VISION ─ 3ヶ月後のあなた', `<p style="color:#e8e8e8; line-height:1.85; font-family:inherit;">${vision}</p>`);

        return html;
      }
    });
  </script>
</body>
</html>
