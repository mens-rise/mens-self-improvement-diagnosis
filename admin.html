<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理ダッシュボード | Men's Rise</title>
  <link rel="stylesheet" href="css/style.css?v=202604230300">
  <style>
    body { background: var(--bg); }
    .admin-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 20px;
    }
    .admin-title {
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 4px;
      letter-spacing: 0.05em;
    }
    .admin-subtitle {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-bottom: 32px;
    }
    .login-box {
      max-width: 360px;
      margin: 80px auto;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      text-align: center;
    }
    .login-box input {
      width: 100%;
      padding: 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      margin-bottom: 12px;
    }
    .login-error {
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 8px;
    }
    /* ダッシュボード */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      text-align: center;
    }
    .stat-card-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .stat-card-num {
      font-size: 2rem;
      font-weight: 900;
      color: var(--gold);
    }
    .chart-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      margin-bottom: 20px;
    }
    .chart-title {
      font-size: 0.75rem;
      color: var(--gold);
      letter-spacing: 0.1em;
      margin-bottom: 16px;
      text-transform: uppercase;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 0.8rem;
    }
    .bar-label {
      min-width: 120px;
      color: var(--text);
    }
    .bar-track {
      flex: 1;
      height: 18px;
      background: var(--bg-elevated);
      border-radius: 9px;
      overflow: hidden;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
      border-radius: 9px;
      transition: width 0.5s ease;
    }
    .bar-value {
      min-width: 40px;
      text-align: right;
      color: var(--text-muted);
      font-size: 0.75rem;
    }
    /* 検索 */
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    .search-box input {
      flex: 1;
      padding: 14px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
    }
    .search-box button {
      padding: 14px 24px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .user-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 14px;
    }
    .user-card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .user-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
    }
    .user-time {
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .user-diagnosis {
      display: inline-block;
      padding: 3px 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--gold);
      color: var(--gold);
      border-radius: 20px;
      font-size: 0.68rem;
      font-weight: 600;
      margin-right: 6px;
    }
    .user-row {
      display: flex;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin: 6px 0;
    }
    .user-row-label {
      min-width: 80px;
      color: var(--text-muted);
      font-size: 0.75rem;
    }
    .user-data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px 16px;
      margin-top: 10px;
    }
    .data-item {
      font-size: 0.75rem;
    }
    .data-item-label {
      color: var(--text-muted);
      margin-right: 6px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    .section-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      padding: 12px 20px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: var(--transition);
    }
    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- ログイン画面 -->
    <div id="loginScreen" class="login-box">
      <h1 class="admin-title">ADMIN</h1>
      <p class="admin-subtitle">Men's Rise Dashboard</p>
      <input type="password" id="passwordInput" placeholder="パスワード">
      <button class="start-btn" id="loginBtn" style="width:100%;">ログイン</button>
      <p class="login-error" id="loginError" style="display:none;">パスワードが違います</p>
    </div>

    <!-- ダッシュボード本体 -->
    <div id="dashboardScreen" class="admin-container" style="display:none;">
      <h1 class="admin-title">ADMIN DASHBOARD</h1>
      <p class="admin-subtitle">Men's Rise 男磨き診断ツール</p>

      <div class="section-tabs">
        <button class="tab-btn active" data-tab="stats">統計レポート</button>
        <button class="tab-btn" data-tab="search">ユーザー検索</button>
      </div>

      <!-- 統計タブ -->
      <div id="statsTab">
        <div class="loading" id="statsLoading">読み込み中...</div>
        <div id="statsContent" style="display:none;">
          <div class="stats-grid" id="statsGrid"></div>
          <div class="chart-section" id="comparisonPanel"></div>
          <div class="chart-section" id="ctaSummary"></div>
          <div class="chart-section" id="ctaChart"></div>
          <div class="chart-section" id="ageChart"></div>
          <div class="chart-section" id="ctaAgeChart"></div>
          <div class="chart-section" id="diagnosisChart"></div>
          <div class="chart-section" id="typeChart"></div>
        </div>
      </div>

      <!-- 検索タブ -->
      <div id="searchTab" style="display:none;">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="名前で検索（例：山田）">
          <button id="searchBtn">検索</button>
        </div>
        <div id="searchResults">
          <div class="empty-state">名前を入力して検索してください</div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/config.js?v=202604230300"></script>
  <script>
    // ============ ログイン ============
    const loginBtn = document.getElementById('loginBtn');
    const passwordInput = document.getElementById('passwordInput');
    const loginError = document.getElementById('loginError');

    function tryLogin() {
      if (passwordInput.value === CONFIG.ADMIN_PASSWORD) {
        sessionStorage.setItem('mr_admin', 'ok');
        showDashboard();
      } else {
        loginError.style.display = 'block';
      }
    }

    loginBtn.addEventListener('click', tryLogin);
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') tryLogin();
    });

    // 既にログイン済みなら自動表示
    if (sessionStorage.getItem('mr_admin') === 'ok') {
      showDashboard();
    }

    function showDashboard() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboardScreen').style.display = 'block';
      loadStats();
    }

    // ============ タブ切替 ============
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('statsTab').style.display = tab === 'stats' ? 'block' : 'none';
        document.getElementById('searchTab').style.display = tab === 'search' ? 'block' : 'none';
      });
    });

    // ============ 統計読み込み ============
    const DIAGNOSIS_LABELS = {
      kintore: '筋トレ診断',
      hada: '肌質診断',
      kamigata: '髪型診断',
      fashion: 'ファッション診断',
      phase: '男磨きフェーズ診断'
    };

    async function loadStats() {
      try {
        const res = await fetch(`${CONFIG.GAS_ENDPOINT}?action=stats`);
        const json = await res.json();
        if (json.status !== 'ok') throw new Error(json.message);

        const s = json.data;
        document.getElementById('statsLoading').style.display = 'none';
        document.getElementById('statsContent').style.display = 'block';

        // CTA統計（GASが古いバージョンでも落ちないようデフォルト値を用意）
        const cta = s.cta || { totalClicks: 0, uniqueUsers: 0, bySource: {}, byDiagnosis: {} };
        // ユニーク診断ユーザーに対する、CTAクリック（ユニーク）率
        const ctaRate = s.uniqueUsers
          ? ((cta.uniqueUsers / s.uniqueUsers) * 100).toFixed(1)
          : 0;

        // サマリーカード（CTA指標を追加）
        document.getElementById('statsGrid').innerHTML = `
          <div class="stat-card">
            <div class="stat-card-label">総回答数</div>
            <div class="stat-card-num">${s.total}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">ユーザー数</div>
            <div class="stat-card-num">${s.uniqueUsers}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">平均診断数/人</div>
            <div class="stat-card-num">${s.uniqueUsers ? (s.total / s.uniqueUsers).toFixed(1) : 0}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">VSLクリック<br>（ユニーク）</div>
            <div class="stat-card-num">${cta.uniqueUsers}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">VSLクリック<br>（総数）</div>
            <div class="stat-card-num">${cta.totalClicks}</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">診断→VSL<br>クリック率</div>
            <div class="stat-card-num">${ctaRate}%</div>
          </div>
        `;

        // ========= Before/After 比較（CTA装飾リニューアル前後） =========
        const cmp = s.comparison;
        const cmpEl = document.getElementById('comparisonPanel');
        if (cmp && (cmp.before.uniqueUsers > 0 || cmp.after.uniqueUsers > 0)) {
          const cutoffDate = new Date(cmp.cutoffISO);
          const isFuture = cutoffDate.getTime() > Date.now();
          const deltaColor = cmp.deltaRate > 0 ? '#22c55e' : (cmp.deltaRate < 0 ? '#ef4444' : 'var(--text-muted)');
          const deltaSign = cmp.deltaRate > 0 ? '+' : '';

          cmpEl.innerHTML = `
            <div class="chart-title">CTA改善 Before / After 比較</div>
            ${isFuture
              ? `<div style="padding:12px 14px; background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.3); border-radius:8px; color:#fca5a5; font-size:0.78rem; margin-bottom:16px; line-height:1.6;">
                  ⚠️ リニューアル日時（<strong>${cutoffDate.toLocaleString('ja-JP')}</strong>）が未来のため、現時点のデータは全て<strong>Before</strong>に集計されています。<br>
                  CTA装飾を本番デプロイしたら、GASの <code>CTA_V2_SINCE</code> を実際の日時に更新してください。
                </div>`
              : `<div style="color:var(--text-muted); font-size:0.72rem; margin-bottom:16px;">
                  境界日時：<strong style="color:var(--text-secondary);">${cutoffDate.toLocaleString('ja-JP')}</strong>
                </div>`
            }
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
              <div style="background:var(--bg-elevated); border:1px solid var(--border); border-radius:10px; padding:16px 14px;">
                <div style="font-size:0.68rem; color:var(--text-muted); letter-spacing:0.1em; margin-bottom:8px;">BEFORE</div>
                <div style="font-size:0.78rem; color:var(--text-secondary); line-height:1.9;">
                  診断ユーザー：<strong style="color:#fff;">${cmp.before.uniqueUsers}</strong>人<br>
                  VSLクリック：<strong style="color:#fff;">${cmp.before.ctaUnique}</strong>人<br>
                  クリック率：<strong style="color:var(--gold); font-size:1rem;">${cmp.before.rate}%</strong>
                </div>
              </div>
              <div style="background:var(--bg-elevated); border:1px solid var(--gold); border-radius:10px; padding:16px 14px;">
                <div style="font-size:0.68rem; color:var(--gold); letter-spacing:0.1em; margin-bottom:8px;">AFTER</div>
                <div style="font-size:0.78rem; color:var(--text-secondary); line-height:1.9;">
                  診断ユーザー：<strong style="color:#fff;">${cmp.after.uniqueUsers}</strong>人<br>
                  VSLクリック：<strong style="color:#fff;">${cmp.after.ctaUnique}</strong>人<br>
                  クリック率：<strong style="color:var(--gold); font-size:1rem;">${cmp.after.rate}%</strong>
                </div>
              </div>
            </div>
            <div style="text-align:center; padding:14px; background:var(--bg-elevated); border-radius:10px;">
              <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:4px;">クリック率の変化</div>
              <div style="font-size:1.4rem; font-weight:900; color:${deltaColor};">
                ${deltaSign}${cmp.deltaRate}pt
              </div>
            </div>
          `;
        } else {
          cmpEl.style.display = 'none';
        }

        // VSLクリックサマリー
        const srcLabels = { result: '診断結果ページから', top: 'トップページから', unknown: '(不明)' };
        document.getElementById('ctaSummary').innerHTML = `
          <div class="chart-title">VSL（説明会ページ）クリック数</div>
          <div style="font-size:0.78rem; color:var(--text-secondary); line-height:1.8; margin-bottom:4px;">
            <strong style="color:var(--gold); font-size:1rem;">${cta.uniqueUsers}</strong> 人が <strong>「説明会の詳細をチェックする」</strong> ボタンをタップ（同じ名前は1カウント）<br>
            総タップ数：<strong>${cta.totalClicks}</strong> 回<br>
            診断回答者 <strong>${s.uniqueUsers}</strong> 人中 → クリック率 <strong style="color:var(--gold);">${ctaRate}%</strong>
          </div>
          <div style="margin-top:12px;">
            ${Object.entries(cta.bySource).length === 0
              ? '<div style="color:var(--text-muted); font-size:0.78rem;">まだクリックはありません</div>'
              : Object.entries(cta.bySource).map(([src, n]) => `
                <div class="bar-row">
                  <div class="bar-label">${srcLabels[src] || src}</div>
                  <div class="bar-track"><div class="bar-fill" style="width:${(n / cta.totalClicks) * 100}%"></div></div>
                  <div class="bar-value">${n}</div>
                </div>
              `).join('')}
          </div>
        `;

        // 診断別CTAクリック
        const ctaDiagEntries = Object.entries(cta.byDiagnosis);
        if (ctaDiagEntries.length > 0) {
          const maxCtaDiag = Math.max(...ctaDiagEntries.map(e => e[1]), 1);
          document.getElementById('ctaChart').innerHTML = `
            <div class="chart-title">診断別 VSLクリック数</div>
            ${ctaDiagEntries.map(([k, v]) => `
              <div class="bar-row">
                <div class="bar-label">${k}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${(v / maxCtaDiag) * 100}%"></div></div>
                <div class="bar-value">${v}</div>
              </div>
            `).join('')}
          `;
        } else {
          document.getElementById('ctaChart').style.display = 'none';
        }

        // ========= 年齢別グラフ =========
        const AGE_ORDER = ['〜19歳', '20〜24歳', '25〜29歳', '30〜34歳', '35〜39歳', '40歳〜', '(不明)'];
        const byAge = s.byAgeGroup || {};
        const ctaByAge = (cta.byAgeGroup) || {};
        const ageEntries = AGE_ORDER.filter(k => byAge[k] || ctaByAge[k]);

        if (ageEntries.length > 0) {
          // 年齢層別 ユーザー数
          const maxAge = Math.max(...ageEntries.map(k => byAge[k] || 0), 1);
          document.getElementById('ageChart').innerHTML = `
            <div class="chart-title">年齢層別 ユーザー数</div>
            ${ageEntries.map(k => `
              <div class="bar-row">
                <div class="bar-label">${k}</div>
                <div class="bar-track"><div class="bar-fill" style="width:${((byAge[k] || 0) / maxAge) * 100}%"></div></div>
                <div class="bar-value">${byAge[k] || 0}</div>
              </div>
            `).join('')}
          `;

          // 年齢層別 VSLクリック数＋クリック率
          document.getElementById('ctaAgeChart').innerHTML = `
            <div class="chart-title">年齢層別 VSLクリック率</div>
            <div style="font-size:0.72rem; color:var(--text-muted); margin-bottom:12px;">
              各年齢層の診断回答者のうち、VSLボタンをタップした人の割合（同名1カウント）
            </div>
            ${ageEntries.map(k => {
              const users = byAge[k] || 0;
              const clicks = ctaByAge[k] || 0;
              const rate = users ? ((clicks / users) * 100).toFixed(1) : '0.0';
              return `
                <div class="bar-row">
                  <div class="bar-label">${k}</div>
                  <div class="bar-track"><div class="bar-fill" style="width:${rate}%"></div></div>
                  <div class="bar-value" style="min-width:100px;">${clicks}/${users}人 (${rate}%)</div>
                </div>
              `;
            }).join('')}
          `;
        } else {
          document.getElementById('ageChart').style.display = 'none';
          document.getElementById('ctaAgeChart').style.display = 'none';
        }

        // 診断別グラフ
        const maxDiag = Math.max(...Object.values(s.byDiagnosis), 1);
        document.getElementById('diagnosisChart').innerHTML = `
          <div class="chart-title">診断別 回答数</div>
          ${Object.entries(s.byDiagnosis).map(([k, v]) => `
            <div class="bar-row">
              <div class="bar-label">${DIAGNOSIS_LABELS[k] || k}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${(v / maxDiag) * 100}%"></div></div>
              <div class="bar-value">${v}</div>
            </div>
          `).join('')}
        `;

        // タイプ別グラフ
        const maxType = Math.max(...Object.values(s.byResult), 1);
        const sortedTypes = Object.entries(s.byResult)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 15);
        document.getElementById('typeChart').innerHTML = `
          <div class="chart-title">タイプ別 分布（TOP15）</div>
          ${sortedTypes.map(([k, v]) => {
            const [did, type] = k.split(':');
            return `
              <div class="bar-row">
                <div class="bar-label" style="min-width:180px; font-size:0.72rem;">
                  <span style="color:var(--gold); font-size:0.65rem;">[${DIAGNOSIS_LABELS[did] || did}]</span><br>${type}
                </div>
                <div class="bar-track"><div class="bar-fill" style="width:${(v / maxType) * 100}%"></div></div>
                <div class="bar-value">${v}</div>
              </div>
            `;
          }).join('')}
        `;
      } catch (err) {
        document.getElementById('statsLoading').innerHTML = '読み込みに失敗しました。GAS設定を確認してください。';
        console.error(err);
      }
    }

    // ============ 検索 ============
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('searchInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSearch();
    });

    async function doSearch() {
      const name = document.getElementById('searchInput').value.trim();
      const container = document.getElementById('searchResults');
      if (!name) {
        container.innerHTML = '<div class="empty-state">名前を入力してください</div>';
        return;
      }
      container.innerHTML = '<div class="loading">検索中...</div>';

      try {
        const res = await fetch(`${CONFIG.GAS_ENDPOINT}?action=search&name=${encodeURIComponent(name)}`);
        const json = await res.json();
        if (json.status !== 'ok') throw new Error(json.message);

        const records = json.data;
        if (records.length === 0) {
          container.innerHTML = '<div class="empty-state">該当するユーザーが見つかりません</div>';
          return;
        }

        // 名前でグルーピング
        const grouped = {};
        records.forEach(r => {
          const n = r['名前'] || '(名前なし)';
          if (!grouped[n]) grouped[n] = [];
          grouped[n].push(r);
        });

        container.innerHTML = Object.entries(grouped).map(([userName, recs]) => {
          const latest = recs.sort((a, b) => new Date(b['日時']) - new Date(a['日時']))[0];
          return `
            <div class="user-card">
              <div class="user-card-header">
                <div class="user-name">${userName}</div>
                <div class="user-time">最終回答: ${new Date(latest['日時']).toLocaleString('ja-JP')}</div>
              </div>
              <div>
                ${recs.map(r => `<span class="user-diagnosis">${r['診断名'] || DIAGNOSIS_LABELS[r['診断ID']] || r['診断ID']}: ${r['診断結果']}</span>`).join('')}
              </div>
              <div class="user-data-grid">
                ${latest['年齢'] ? `<div class="data-item"><span class="data-item-label">年齢:</span>${latest['年齢']}歳</div>` : ''}
                ${latest['身長'] ? `<div class="data-item"><span class="data-item-label">身長:</span>${latest['身長']}cm</div>` : ''}
                ${latest['体重'] ? `<div class="data-item"><span class="data-item-label">体重:</span>${latest['体重']}kg</div>` : ''}
                ${latest['男磨き予算'] ? `<div class="data-item"><span class="data-item-label">予算:</span>${latest['男磨き予算']}</div>` : ''}
                ${latest['美容院頻度'] ? `<div class="data-item"><span class="data-item-label">美容院:</span>${latest['美容院頻度']}</div>` : ''}
                ${latest['肌の悩み'] ? `<div class="data-item"><span class="data-item-label">肌の悩み:</span>${latest['肌の悩み']}</div>` : ''}
              </div>
            </div>
          `;
        }).join('');
      } catch (err) {
        container.innerHTML = '<div class="empty-state">検索に失敗しました</div>';
        console.error(err);
      }
    }
  </script>
</body>
</html>
