<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>筋トレ診断 | Men's Rise</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app"></div>
  <script src="js/config.js"></script>
  <script src="js/database.js"></script>
  <script src="js/cta-variants.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/quiz-engine.js"></script>
  <script>
    new QuizEngine({      diagnosisId: 'kintore',
      iconSvg: MR_ICONS.kintore,
      title: '骨格×体型に合った<br>筋トレ診断',
      description: 'あなたの骨格タイプを診断して<br>最適なトレーニングを提案します',
      meta: '所要時間：約2分 ｜ 全7問',

      questions: [
        {
          id: 'body',
          sharedKey: 'body',
          text: '身長と体重を教えてください',
          hint: '体型タイプの判定に使用します',
          type: 'number',
          fields: [
            { key: 'height', label: '身長', placeholder: '170', suffix: 'cm' },
            { key: 'weight', label: '体重', placeholder: '65', suffix: 'kg' }
          ]
        },
        {
          id: 'targetBody',
          text: 'どちらの体型を目指したい？',
          hint: 'あなたの目標に合わせて食事・トレーニングの方向性を調整します',
          type: 'image-choice',
          options: [
            {
              label: '細マッチョ',
              desc: '引き締まった自然な筋肉質',
              value: 'lean',
              image: 'images/body-lean.png'
            },
            {
              label: 'アスリート体型',
              desc: 'しっかり鍛え上げた逞しい筋肉',
              value: 'athlete',
              image: 'images/body-athlete.png'
            }
          ]
        },
        {
          id: 'wrist',
          text: '手首テスト',
          hint: '利き手じゃない方の手首を親指と中指で囲んでみて',
          options: [
            { label: '余裕で重なる', value: 'overlap' },
            { label: 'ちょうど触れ合う', value: 'touch' },
            { label: '全く届かない', value: 'gap' }
          ]
        },
        {
          id: 'metabolism',
          text: '食事と体重の関係は？',
          options: [
            { label: '食べても太れない', value: 'fast' },
            { label: '食べたら太るがすぐ戻せる', value: 'normal' },
            { label: '食べたら太って落ちにくい', value: 'slow' }
          ]
        },
        {
          id: 'experience',
          text: '筋トレ経験は？',
          options: [
            { label: '未経験', value: 'none' },
            { label: '半年未満', value: 'beginner' },
            { label: '半年〜1年', value: 'intermediate' },
            { label: '1年以上', value: 'advanced' }
          ]
        },
        {
          id: 'gym',
          text: 'ジム環境は？',
          options: [
            { label: 'ジム通い', value: 'gym' },
            { label: '自宅のみ', value: 'home' }
          ]
        },
        {
          id: 'frequency',
          text: '週何回トレーニングできそう？',
          options: [
            { label: '週2回', value: 'two' },
            { label: '週3回', value: 'three' },
            { label: '週4回以上', value: 'four' }
          ]
        }
      ],

      calcResult: function(answers) {
        const wrist = answers.wrist;
        const metabolism = answers.metabolism;
        let type = 'ecto'; // default: lean toward 痩せ型

        if (wrist === 'overlap') {
          type = 'ecto';
        } else if (wrist === 'gap') {
          type = 'endo';
        } else if (wrist === 'touch' && metabolism === 'normal') {
          type = 'meso';
        } else if (wrist === 'touch' && metabolism === 'fast') {
          type = 'ecto';
        } else if (wrist === 'touch' && metabolism === 'slow') {
          type = 'endo';
        }

        // Specific overrides
        if (wrist === 'overlap' && metabolism === 'fast') type = 'ecto';
        if (wrist === 'touch' && metabolism === 'normal') type = 'meso';
        if (wrist === 'gap' && metabolism === 'slow') type = 'endo';

        return {
          type: type,
          gym: answers.gym,
          frequency: answers.frequency,
          experience: answers.experience
        };
      },

      renderResult: function(result, answers) {
        const data = {
          ecto: {
            name: '痩せ型（エクトモルフ）',
            feature: '代謝が良すぎて太りにくい。筋肉もつきにくいが、一度筋肉がつけば脂肪に邪魔されずカットが綺麗に出る。',
            strategy: '「短時間・高重量」。種目を絞って大きい筋肉を一気に動かす。ジム滞在は60分以内。ダラダラやるな。',
            action: 'まずバーベルスクワットを8回×3セットやれ。足は体で一番デカい筋肉。成長ホルモンが出る。',
            food: '高炭水化物・中タンパク・中脂質。とにかく食え。1日4〜5食。糖質制限は絶対NG。',
            why: '代謝が基礎的に高く、摂取カロリーがすぐエネルギーに変換される体質。交感神経が優位で、筋肉がつきにくく脂肪もつきにくい。だから「食べる量」と「高重量の刺激」の両方が揃わないと体が変わらない。',
            weeklyMenu: `
              <table class="menu-table">
                <tr><th>曜日</th><th>メニュー</th></tr>
                <tr><td><strong>月曜</strong></td><td>バーベルスクワット 8回×3<br>ベンチプレス 8回×3<br>ラットプルダウン 8回×3</td></tr>
                <tr><td><strong>水曜</strong></td><td>ダンベルショルダープレス 8回×3<br>アブローラー 10回×3</td></tr>
                <tr><td><strong>金曜</strong></td><td>上記の組み合わせでローテーション</td></tr>
              </table>
              <p style="margin-top:12px;font-size:0.9em;opacity:0.8;">週3回・短時間・高重量が鉄則。60分以内で切り上げる。</p>
            `,
            ng: [
              '長時間トレーニング（カロリー消費しすぎ）',
              '空腹で長時間過ごす',
              '朝食抜き（筋肉が分解される）',
              '糖質制限'
            ],
            vision: '「細マッチョ化」の入口。腕が一回り太くなり、胸板に厚みが出る。体重は2〜3kg増えてしっかり食べられるようになる。Tシャツの着こなしが変わり、鎖骨のラインに厚みが加わる。'
          },
          meso: {
            name: '筋肉質型（メソモルフ）',
            feature: '少し鍛えたらすぐ筋肉がつく。脂肪も落としやすい。才能ある体。油断すると太るので注意。',
            strategy: '「部位分割法（リーンバルク）」。週3回で部位を分けてトレーニング。',
            action: 'まずベンチプレスを10回×3セットやれ。胸を育てろ。',
            food: '高タンパク・中炭水化物・低〜中脂質。PFCバランス管理。タンパク質は体重×2g。',
            why: '骨格がバランスよく、筋肉の合成効率が高い体質。テストステロンの働きが良く、トレーニングへの反応が早い。刺激を入れれば入れた分だけ返ってくる恵まれた体。だからこそ「正しい負荷」と「正しい食事」をサボると一気に停滞する。',
            weeklyMenu: `
              <table class="menu-table">
                <tr><th>曜日</th><th>部位</th><th>メニュー</th></tr>
                <tr><td><strong>月曜</strong></td><td>胸</td><td>ベンチプレス 10回×3<br>インクラインダンベル 10回×3<br>ケーブルクロス 12回×3</td></tr>
                <tr><td><strong>水曜</strong></td><td>背中</td><td>デッドリフト 8回×3<br>ラットプルダウン 10回×3<br>シーテッドロウ 10回×3</td></tr>
                <tr><td><strong>金曜</strong></td><td>肩+脚</td><td>スクワット 10回×3<br>レッグプレス 12回×3<br>ショルダープレス 10回×3</td></tr>
              </table>
              <p style="margin-top:12px;font-size:0.9em;opacity:0.8;">週3回の部位分割。回復日をしっかり取ることで合成効率が最大化する。</p>
            `,
            ng: [
              '惰性で揚げ物定食・ラーメンセット',
              '運動しない日の夜の白米大量摂取',
              '同じメニューを何ヶ月も続ける（慣れる）'
            ],
            vision: '「アスリート体型」が完成形。腹筋が浮き出て、肩・胸・背中のメリハリが明確に。体脂肪率は12%前後を狙える。服の上からでも「鍛えてる人」とわかるシルエットに変わる。'
          },
          endo: {
            name: 'がっしり型（エンドモルフ）',
            feature: '力は強いが脂肪で筋肉が隠れている。パワーはある。脂肪さえ落とせばすぐにかっこいい体になるポテンシャル。',
            strategy: '「消費カロリーを増やす」。セット間休憩短く密度高く。筋トレ後に有酸素20分。',
            action: 'まずスミスベンチプレスを10回×3セットやれ。そのあと有酸素20分。',
            food: '高タンパク・低脂質・低炭水化物。食事管理が成功の8割。夜の白米を半分or抜く。',
            why: '副交感神経が優位で、エネルギーを蓄えやすい体質。基礎代謝が低めで脂肪がつきやすいが、筋力の絶対値は強い。つまり「パワーの土台」はすでにある。あとは上に乗っている脂肪をどう削ぎ落とすかが全て。',
            weeklyMenu: `
              <table class="menu-table">
                <tr><th>部位</th><th>メニュー</th></tr>
                <tr><td><strong>胸</strong></td><td>2種目×3セット（15回）</td></tr>
                <tr><td><strong>背中</strong></td><td>2種目×3セット（15回）</td></tr>
                <tr><td><strong>脚</strong></td><td>2種目×3セット（15回）</td></tr>
                <tr><td><strong>腹筋</strong></td><td>2種目×3セット（15回）</td></tr>
                <tr><td><strong>有酸素</strong></td><td>筋トレ後に20分（心拍120キープ）</td></tr>
              </table>
              <p style="margin-top:12px;font-size:0.9em;opacity:0.8;">週3〜4回・高回数・インターバル短め。休みすぎると脂肪燃焼モードに入らない。</p>
            `,
            ng: [
              '締めラーメン、菓子パン、毎日ご褒美',
              'ジュース・加糖コーヒー・スポドリ',
              '揚げ物中心の食事',
              '長時間座りっぱなし'
            ],
            vision: '「ガッチリ引き締まった体型」。お腹周りが3〜5cm細くなり、スーツを着たときのシルエットが変わる。体重より見た目の変化が先に来る。二重あごが取れ、顎のラインがシャープになる。'
          }
        };

        const d = data[result.type];

        let html = '';

        // Result header
        html += `
          <div class="result-header">
            <div class="result-label">YOUR TYPE</div>
            <div class="result-type">${d.name}</div>
          </div>
        `;

        // Free content cards
        html += QuizEngine.resultCard('YOUR FEATURE ─ 特徴', `<p>${d.feature}</p>`);

        html += QuizEngine.resultCard('STRATEGY ─ 戦略', `<p><strong>${d.strategy}</strong></p>`);

        html += QuizEngine.resultCard('TODAY\'S ACTION ─ 今日やること', `<p>${d.action}</p>`);

        html += QuizEngine.resultCard('FOOD ─ 食事の方向性', `
          <div class="result-highlight">${d.food}</div>
        `);

        // Enhanced detailed know-how cards
        html += QuizEngine.resultCard('WHY ─ なぜあなたがこのタイプか', `<p>${d.why}</p>`);

        html += QuizEngine.resultCard('WEEKLY MENU ─ 1週間のトレーニングメニュー', d.weeklyMenu);

        const ngListHtml = d.ng.map(item => `<li>✗ ${item}</li>`).join('');
        html += QuizEngine.resultCard('NG ─ 避けるべきこと', `<ul class="check-list">${ngListHtml}</ul>`);

        html += QuizEngine.resultCard('VISION ─ 3ヶ月後のあなた', `<p>${d.vision}</p>`);

        // Gated content
        html += QuizEngine.gatedBlock('あなた専用の完全版メニュー', `
          <table class="menu-table">
            <tr>
              <th>内容</th>
              <th>詳細</th>
            </tr>
            <tr>
              <td><strong>週間メニュー表</strong></td>
              <td>全種目・重量・セット数を網羅</td>
            </tr>
            <tr>
              <td><strong>食事テンプレ</strong></td>
              <td>あなたのタイプに合った1週間分</td>
            </tr>
            <tr>
              <td><strong>サプリ推薦</strong></td>
              <td>おすすめプロテイン＆サプリ</td>
            </tr>
            <tr>
              <td><strong>最短ロードマップ</strong></td>
              <td>あなたの体型に合う理想の体へ</td>
            </tr>
          </table>
        `);

        return html;
      }
    });
  </script>
</body>
</html>
