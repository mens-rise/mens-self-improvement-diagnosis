      meta: '所要時間：約2分 ｜ 全7問',

      questions: [
        {
          id: 'height',
          text: '身長は？',

            { label: 'がっしり', value: 'muscular' }

          id: 'body',

          text: '身長・体重を教えてください',
          hint: 'コーデ提案の精度を上げるために使用します',

            { key: 'weight', label: '体重', placeholder: '65', suffix: 'kg' }

        {
          id: 'budget',
          text: '月のファッション予算は？',
          options: [
            { label: '5,000円以内', value: 'low' },

            { label: '3万円以内', value: 'high' },
            { label: 'こだわらない', value: 'unlimited' }
          ]
        },
        {
          id: 'season',
          text: '今の季節は？',
          hint: 'コーデ提案に使います',
          options: [
            { label: '春', value: 'spring' },
            { label: '夏', value: 'summer' },
            { label: '秋', value: 'autumn' },
            { label: '冬', value: 'winter' }
          ]

        {
          id: 'style',
          text: '普段の服装は？',
          options: [
            { label: 'ほぼ考えてない', value: 'none' },
            { label: 'なんとなく選んでる', value: 'casual' },
            { label: 'ある程度こだわってる', value: 'conscious' }
          ]
        },
        {
          id: 'trouble',
          text: '何に一番困ってる？',
          options: [
            { label: '何買えばいいかわからない', value: 'what' },
            { label: '組み合わせがわからない', value: 'combine' },
            { label: 'サイズ感がわからない', value: 'size' },
            { label: 'ダサく見える', value: 'look' }
          ]
        }
      ],

      calcResult: function(answers) {
        var height = answers.height;
        var bodyType = answers.bodyType;
        var category;

        if (height === 'short' && (bodyType === 'slim' || bodyType === 'normal')) {
          category = 'short_slim';
        } else if (height === 'short' && (bodyType === 'chubby' || bodyType === 'muscular')) {
          category = 'short_big';
        } else if (height === 'medium') {
          category = 'medium_all';
        } else if (height === 'tall' && bodyType === 'slim') {
          category = 'tall_slim';
        } else if (height === 'tall' && (bodyType === 'normal' || bodyType === 'chubby' || bodyType === 'muscular')) {
          category = 'tall_normal';
        }

        return {
          category: category,
          season: answers.season,
          budget: answers.budget,
          trouble: answers.trouble,
          height: height,
          bodyType: bodyType
        };
      },

        html += QuizEngine.resultCard('THEORY ─ 覚えるべき2つの法則', '<div style="margin-bottom:14px;"><p style="font-weight:700; margin-bottom:4px; color:var(--white);">ドレス7 : カジュアル3</p><p style="font-size:0.85rem; color:var(--text);">全体の7割をドレス（きれいめ）、3割をカジュアルにするとバランスが取れる。黒スラックス＋ローファーで下半身をドレスに固定すれば、トップスで遊べる。</p></div><div><p style="font-weight:700; margin-bottom:4px; color:var(--white);">3分割コーデ法</p><p style="font-size:0.85rem; color:var(--text);">体を「アウター・インナー・ボトムス」の3ブロックに分割して考える。3色以内に収め、1つのブロックだけアクセントにすると簡単にまとまる。</p></div>');

        // --- WHY card (なぜこの体型にこのスタイルか) ---
        html += QuizEngine.resultCard('WHY ─ なぜあなたの体型にこのスタイルか', '<p style="font-size:0.88rem; line-height:1.8; color:var(--text);">' + whyData[result.category] + '</p>');

        // --- 予算別ショッピングリスト（優先順位）---
        html += QuizEngine.resultCard('SHOPPING LIST ─ 予算別ショッピングリスト（優先順位）', '<div style="margin-bottom:14px;"><p style="font-weight:700; margin-bottom:6px; color:var(--gold);">優先順位1（まず買え）</p><ul style="font-size:0.85rem; color:var(--text); line-height:1.75; padding-left:18px; margin:0;"><li>黒スラックス（ユニクロ or GU「センタープレスワイドストレート」税込2,000〜4,000円）</li><li>コインローファー（ABCマート or ミハマ、黒、税込5,000〜8,000円）</li></ul></div><div style="margin-bottom:14px;"><p style="font-weight:700; margin-bottom:6px; color:var(--gold);">優先順位2（次に買え）</p><ul style="font-size:0.85rem; color:var(--text); line-height:1.75; padding-left:18px; margin:0;"><li>白無地Tシャツ（ユニクロ「U」クルーネック、1,500円）</li><li>オックスフォードシャツ（ユニクロ、2,990円）</li></ul></div><div><p style="font-weight:700; margin-bottom:6px; color:var(--gold);">優先順位3（慣れてきたら）</p><ul style="font-size:0.85rem; color:var(--text); line-height:1.75; padding-left:18px; margin:0;"><li>カテゴリ別のキーアイテム（ブレザー／テーラード／ロングコートなど、あなたの体型に合ったキーアイテム）</li></ul></div>');

        // --- NG行動（避けるべきこと）---
        html += QuizEngine.resultCard('NG ACTIONS ─ 避けるべき行動', '<ul style="font-size:0.85rem; color:var(--text); line-height:1.85; padding-left:18px; margin:0;"><li>毎シーズンすべてのアイテムを新調する（軸のアイテムを長く使う）</li><li>セールだからと買う（サイズが合わなければ意味なし）</li><li>「ブランド」で選ぶ（シルエットと色で選ぶ）</li><li>サイズ直しをしない（既製品そのままは99%合っていない）</li><li>靴を1足しか持たない（革靴・スニーカー・ローファーの3足は最低持つ）</li></ul>');

        // --- 3ヶ月後の変化イメージ ---
        html += QuizEngine.resultCard('FUTURE ─ 3ヶ月後の変化イメージ', '<div class="result-highlight"><p style="font-size:0.9rem; line-height:1.8; color:var(--white); margin:0; font-weight:500;">' + futureData[result.category] + '</p></div>');

        // --- Gated content ---
        html += QuizEngine.gatedBlock('あなた専用のファッション完全ガイド', '<table class="menu-table"><tr><th>内容</th><th>詳細</th></tr><tr><td><strong>全季節コピペコーデ</strong></td><td>春夏秋冬すべてのコーデを網羅</td></tr><tr><td><strong>予算別ショッピングリスト</strong></td><td>商品名＋リンク＋価格つき</td></tr><tr><td><strong>体型別NGファッションリスト</strong></td><td>あなたの体型で避けるべきアイテム一覧</td></tr></table>');

        return html;
      }
    });
