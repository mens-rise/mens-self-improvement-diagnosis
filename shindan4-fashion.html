  <script>
    new QuizEngine({      diagnosisId: 'fashion',
      iconSvg: MR_ICONS.fashion,
      title: '体型別<br>スタイルアップファッション診断',
      description: 'あなたの体型に合わせた<br>最適なコーデを提案します',
      meta: '所要時間：約2分 ｜ 全7問',

      questions: [
        {
          id: 'height',
          text: '身長は？',
          options: [
            { label: '〜165cm', value: 'short' },
            { label: '165〜170cm', value: 'medium' },
            { label: '170cm〜', value: 'tall' }
          ]
        },
        {
          id: 'bodyType',
          text: '体型は？',
          options: [
            { label: '細身', value: 'slim' },
            { label: '普通', value: 'normal' },
            { label: 'ぽっちゃり', value: 'chubby' },
            { label: 'がっしり', value: 'muscular' }
          ]
        },
        {
          id: 'body',
          text: '身長・体重を教えてください',
          hint: 'コーデ提案の精度を上げるために使用します',
          type: 'number',
          fields: [
            { key: 'height', label: '身長', placeholder: '170', suffix: 'cm' },
            { key: 'weight', label: '体重', placeholder: '65', suffix: 'kg' }
          ]
        },
        {
          id: 'budget',
          text: '月のファッション予算は？',
          options: [
            { label: '5,000円以内', value: 'low' },
            { label: '1万円以内', value: 'mid' },
            { label: '3万円以内', value: 'high' },
            { label: 'こだわらない', value: 'unlimited' }
          ]
        },
        {
          id: 'season',
          text: '今の季節は？',
          hint: 'コーデ提案に使います',
          options: [
            { label: '春', value: 'spring' },
            { label: '夏', value: 'summer' },
            { label: '秋', value: 'autumn' },
            { label: '冬', value: 'winter' }
          ]
        },
        {
          id: 'style',
          text: '普段の服装は？',
          options: [
            { label: 'ほぼ考えてない', value: 'none' },
            { label: 'なんとなく選んでる', value: 'casual' },
            { label: 'ある程度こだわってる', value: 'conscious' }
          ]
        },
        {
          id: 'trouble',
          text: '何に一番困ってる？',
          options: [
            { label: '何買えばいいかわからない', value: 'what' },
            { label: '組み合わせがわからない', value: 'combine' },
            { label: 'サイズ感がわからない', value: 'size' },
            { label: 'ダサく見える', value: 'look' }
          ]
        }
      ],

      calcResult: function(answers) {
        var height = answers.height;
        var bodyType = answers.bodyType;
        var category;

        if (height === 'short' && (bodyType === 'slim' || bodyType === 'normal')) {
          category = 'short_slim';
        } else if (height === 'short' && (bodyType === 'chubby' || bodyType === 'muscular')) {
          category = 'short_big';
        } else if (height === 'medium') {
          category = 'medium_all';
        } else if (height === 'tall' && bodyType === 'slim') {
          category = 'tall_slim';
        } else if (height === 'tall' && (bodyType === 'normal' || bodyType === 'chubby' || bodyType === 'muscular')) {
          category = 'tall_normal';
        }

        return {
          category: category,
          season: answers.season,
          budget: answers.budget,
          trouble: answers.trouble,
          height: height,
          bodyType: bodyType
        };
      },

        var categoryData = {

            silhouette: 'I〜Yライン',

            reason: '腰位置を上げて足長効果、上半身にボリュームを足して華奢感を中和。',

            fixedItems: '黒スラックス ＋ コインローファー（黒）',

              { cat: 'シューズ', name: 'コインローファー', color: '黒' }
            ]
          },
          short_big: {

              { cat: 'アウター', name: 'リラックスフィットテーラードジャケット', color: 'チャコール' },

              { cat: 'ボトムス', name: '黒スラックス', color: '黒' },

            ]
          },
          tall_normal: {
            spring: [
              { cat: 'アウター', name: '薄手ステンカラーコート', color: 'ベージュ' },
              { cat: 'インナー', name: 'オックスフォードシャツ', color: '薄めのブルー' },

            ]
          }
        };

        // --- Color mapping ---
        var colorMap = {
          '黒': '#1a1a1a',
          '白': '#ffffff',
          'ネイビー': '#1b2a4a',
          'ダークネイビー': '#0f1d33',
          'ベージュ': '#d4b896',
          'カーキ': '#5c6b4e',
          'オリーブ': '#5c6b4e',
          'グレー': '#808080',
          'ダークグレー': '#404040',
          'チャコール': '#333333',
          'ブラウン': '#6b4226',
          'クリーム': '#f5f0e1',
          'サックスブルー': '#6b9bc3',
          '薄めのブルー': '#7ba7cc',
          'ワインレッド': '#722f37',
          '紺': '#1b2a4a'
        };

        // --- Season labels ---
        var seasonLabels = {
          spring: '春コーデ',
          summer: '夏コーデ',
          autumn: '秋コーデ',
          winter: '冬コーデ'
        };

        var d = categoryData[result.category];
        var season = result.season;

        var html = '';

        // Result header
        html += '<div class="result-header">';
        html += '<div class="result-label">YOUR STYLE TYPE</div>';
        html += '<div class="result-type">' + d.type + '</div>';

        // Silhouette card
        html += QuizEngine.resultCard('SILHOUETTE ─ シルエット', '<p><strong>' + d.silhouette + '</strong></p>');

        // Key item card
