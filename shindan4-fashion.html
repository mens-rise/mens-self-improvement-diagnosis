          '② あなたの体型で最初に買うべき1着',
          '<p style="font-size:0.82rem; color:#ccc; margin-bottom:12px; font-family:inherit;">鉄板2点を揃えたら、次はこれ。体型の課題を一発で解決してくれる1着です。</p>'
          + '<div style="padding:16px; background:var(--bg-elevated); border-radius:8px; border-left:3px solid var(--gold);">'
          +   '<div style="color:var(--gold); font-size:0.7rem; letter-spacing:0.1em; margin-bottom:6px; font-family:inherit;">KEY ITEM</div>'
          +   '<div style="color:#fff; font-size:1rem; font-weight:700; margin-bottom:8px; font-family:inherit;">' + d.keyItem + '</div>'
          +   '<div style="color:#ddd; font-size:0.82rem; line-height:1.7; font-family:inherit;">' + d.reason + '</div>'
          + '</div>'
        );

        // 2-3. 今季のコーデ例
        var coords = coordData[result.category][season];
        if (coords) {
          var coordHtml = '<p style="font-size:0.82rem; color:#ccc; margin-bottom:14px; font-family:inherit;">今の季節にそのまま真似できるコーデ例。ユニクロや無印で大体揃います。</p>';
          coordHtml += '<div class="coord-visual" style="margin:0;">';
          coordHtml += '<div class="coord-visual-header"><span class="coord-visual-title">' + seasonLabels[season] + '</span><span class="coord-visual-label">Pattern A</span></div>';
          coordHtml += '<div class="coord-stack">';
          for (var i = 0; i < coords.length; i++) {
            var item = coords[i];
            var dotColor = colorMap[item.color] || '#555';
            coordHtml += '<div class="coord-layer">';
            coordHtml += '<span class="coord-layer-tag">' + item.cat + '</span>';
            coordHtml += '<span class="coord-layer-name">' + item.name + '</span>';
            coordHtml += '<span class="coord-layer-swatch" style="background:' + dotColor + ';"></span>';
            coordHtml += '<span class="coord-layer-color-name">' + item.color + '</span>';
            coordHtml += '</div>';
          }
          coordHtml += '</div>';
          coordHtml += '<div class="coord-visual-note">※ 固定アイテム：黒スラックス ＋ コインローファー（黒）</div>';
          coordHtml += '</div>';
          html += QuizEngine.resultCard('③ 今季のコーデ例', coordHtml);
        }

        // 2-4. 買い物の優先順位リスト
        html += QuizEngine.resultCard(
          '④ 予算別ショッピングリスト',
          '<p style="font-size:0.82rem; color:#ccc; margin-bottom:14px; font-family:inherit;">この順番で揃えれば、買い物で迷わない。ユニクロ中心で1万円台からスタート可能。</p>'
          + '<div style="padding:12px 14px; background:var(--bg-elevated); border-radius:8px; margin-bottom:10px; border-left:3px solid var(--gold);">'
          +   '<div style="color:var(--gold); font-weight:700; font-size:0.82rem; margin-bottom:6px; font-family:inherit;">STEP 1（まず揃える）</div>'
          +   '<ul style="font-size:0.82rem; color:#e8e8e8; line-height:1.75; padding-left:18px; margin:0; font-family:inherit;">'
          +     '<li>黒スラックス（ユニクロ or GU「センタープレスワイドストレート」2,000〜4,000円）</li>'
          +     '<li>コインローファー（ABCマート or ミハマ 5,000〜8,000円）</li>'
          +   '</ul>'
          + '</div>'
          + '<div style="padding:12px 14px; background:var(--bg-elevated); border-radius:8px; margin-bottom:10px; border-left:3px solid var(--gold); opacity:0.9;">'
          +   '<div style="color:var(--gold); font-weight:700; font-size:0.82rem; margin-bottom:6px; font-family:inherit;">STEP 2（次に揃える）</div>'
          +   '<ul style="font-size:0.82rem; color:#e8e8e8; line-height:1.75; padding-left:18px; margin:0; font-family:inherit;">'
          +     '<li>白無地Tシャツ（ユニクロ「U」クルーネック 1,500円）</li>'
          +     '<li>オックスフォードシャツ（ユニクロ 2,990円）</li>'
          +   '</ul>'
          + '</div>'
          + '<div style="padding:12px 14px; background:var(--bg-elevated); border-radius:8px; border-left:3px solid var(--gold); opacity:0.8;">'
          +   '<div style="color:var(--gold); font-weight:700; font-size:0.82rem; margin-bottom:6px; font-family:inherit;">STEP 3（慣れてから）</div>'
          +   '<ul style="font-size:0.82rem; color:#e8e8e8; line-height:1.75; padding-left:18px; margin:0; font-family:inherit;">'
          +     '<li>' + d.keyItem + '（あなたの体型専用のキーアイテム）</li>'
          +   '</ul>'
          + '</div>'
        );

        // ───── オプション ─────
        html += '<div style="text-align:center; margin:48px 0 20px;">'
              + '<div style="width:40px; height:1px; background:var(--border); margin:0 auto 16px;"></div>'
              + '<div style="font-size:0.68rem; letter-spacing:0.2em; color:#777; font-family:inherit;">OPTIONAL — もっと詳しく</div>'
              + '</div>';

        // NG
        html += QuizEngine.resultCard(
          'NG ─ 避けたいこと',
          '<ul style="list-style:none; padding:0; margin:0; font-family:inherit;">'
          + '<li style="color:#ddd; font-size:0.85rem; padding:6px 0; padding-left:20px; position:relative; font-family:inherit;"><span style="position:absolute; left:0; color:#e74c3c;">✗</span>' + d.ng + '</li>'
          + '<li style="color:#ddd; font-size:0.85rem; padding:6px 0; padding-left:20px; position:relative; font-family:inherit;"><span style="position:absolute; left:0; color:#e74c3c;">✗</span>毎シーズンすべて新調する（軸のアイテムを長く使う方が◎）</li>'
          + '<li style="color:#ddd; font-size:0.85rem; padding:6px 0; padding-left:20px; position:relative; font-family:inherit;"><span style="position:absolute; left:0; color:#e74c3c;">✗</span>「ブランド」で選ぶ（シルエットと色で選ぶのが鉄則）</li>'
          + '<li style="color:#ddd; font-size:0.85rem; padding:6px 0; padding-left:20px; position:relative; font-family:inherit;"><span style="position:absolute; left:0; color:#e74c3c;">✗</span>サイズ直しをしない（既製品は99%合っていない）</li>'
          + '</ul>'
        );

        // 3ヶ月後
        html += QuizEngine.resultCard(
          'VISION ─ 3ヶ月後のあなた',
          '<p style="color:#e8e8e8; line-height:1.85; font-family:inherit;">' + futureData[result.category] + '</p>'
        );

        return html;
      }
    });
  </script>
</body>
</html>
